apiVersion: v1
kind: ConfigMap
metadata:
  name: setup-keycloak
  namespace: {{ .Release.Namespace | quote }}
data:
  script.sh: |
    #!/bin/bash
    apt update
    apt install -y curl jq kubectl

    # Initialize Keycloak with MCP Gateway configuration
    # This script sets up the initial realm, clients, groups, and users

    set -e

    # These will be set properly after loading .env in main()
    KEYCLOAK_URL=""  # Will be overridden with KEYCLOAK_ADMIN_URL after .env is loaded
    REALM="mcp-gateway"
    KEYCLOAK_ADMIN=$KEYCLOAK_ADMIN
    KEYCLOAK_ADMIN_PASSWORD=$KEYCLOAK_ADMIN_PASSWORD

    # Colors for output
    RED='\033[0;31m'
    GREEN='\033[0;32m'
    YELLOW='\033[1;33m'
    NC='\033[0m' # No Color

    echo -e "${YELLOW}Keycloak initialization script for MCP Gateway Registry${NC}"
    echo "=============================================="

    # Function to wait for Keycloak to be ready
    wait_for_keycloak() {
        echo -n "Waiting for Keycloak to be ready..."
        local max_attempts=60
        local attempt=0

        while [ $attempt -lt $max_attempts ]; do
            # Try to access the admin console which indicates Keycloak is ready
            if curl -f -s "${KEYCLOAK_URL}/admin/" > /dev/null 2>&1; then
                echo -e " ${GREEN}Ready!${NC}"
                return 0
            fi
            echo -n "."
            sleep 5
            attempt=$((attempt + 1))
        done

        echo -e " ${RED}Timeout!${NC}"
        echo "Keycloak did not become ready within 5 minutes"
        exit 1
    }

    # Function to get admin token
    get_admin_token() {
        local response=$(curl -s -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=${KEYCLOAK_ADMIN}" \
            -d "password=${KEYCLOAK_ADMIN_PASSWORD}" \
            -d "grant_type=password" \
            -d "client_id=admin-cli")

        echo "$response" | grep -o '"access_token":"[^"]*' | cut -d'"' -f4
    }

    # Function to check if realm exists
    realm_exists() {
        local token=$1
        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}")

        [ "$response" = "200" ]
    }

    # Function to create realm step by step
    create_realm() {
        local token=$1

        echo "Creating MCP Gateway realm..."

        # Check if realm already exists
        if realm_exists "$token"; then
            echo -e "${YELLOW}Realm already exists. Skipping creation...${NC}"
            return 0
        fi

        # Create basic realm
        local realm_json='{
            "realm": "mcp-gateway",
            "enabled": true,
            "registrationAllowed": false,
            "loginWithEmailAllowed": true,
            "duplicateEmailsAllowed": false,
            "resetPasswordAllowed": true,
            "editUsernameAllowed": false,
            "sslRequired": "none"
        }'

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$realm_json")

        if [ "$response" = "201" ]; then
            echo -e "${GREEN}Realm created successfully!${NC}"
            return 0
        elif [ "$response" = "409" ]; then
            echo -e "${YELLOW}Realm already exists. Continuing...${NC}"
            return 0
        else
            echo -e "${RED}Failed to create realm. HTTP status: ${response}${NC}"
            echo "Response body:"
            curl -s -X POST "${KEYCLOAK_URL}/admin/realms" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "$realm_json"
            echo ""
            return 1
        fi
    }

    # Upsert a Keycloak client: create if missing, otherwise PUT the full
    # representation to apply any attribute changes (e.g. post.logout.redirect.uris)
    # to existing deployments.
    upsert_client() {
        local token=$1
        local client_id=$2
        local client_json=$3

        local existing_id=$(curl -s \
            -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=${client_id}" \
            | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)

        if [ -z "$existing_id" ]; then
            local status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "$client_json")
            if [ "$status" = "201" ] || [ "$status" = "409" ]; then
                echo -e "${GREEN}Client ${client_id} created${NC}"
            else
                echo -e "${RED}Failed to create client ${client_id} (HTTP ${status})${NC}"
                return 1
            fi
        else
            local status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${existing_id}" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "$client_json")
            if [ "$status" = "204" ]; then
                echo -e "${GREEN}Client ${client_id} updated${NC}"
            else
                echo -e "${RED}Failed to update client ${client_id} (HTTP ${status})${NC}"
                return 1
            fi
        fi
    }

    # Function to create clients
    create_clients() {
        local token=$1

        echo "Creating OAuth2 clients..."

        # Create web client
        local web_client_json='{
            "clientId": "mcp-gateway-web",
            "name": "MCP Gateway Web Client",
            "enabled": true,
            "clientAuthenticatorType": "client-secret",
            "redirectUris": [
                "'${AUTH_SERVER_EXTERNAL_URL:-http://localhost:8888}'/oauth2/callback/keycloak",
                "'${REGISTRY_URL:-http://localhost:7860}'/*",
                "http://localhost:7860/*",
                "http://localhost:8888/*"
            ],
            "webOrigins": [
                "'${REGISTRY_URL:-http://localhost:7860}'",
                "http://localhost:7860",
                "+"
            ],
            "attributes": {
                "post.logout.redirect.uris": "'${REGISTRY_URL:-http://localhost:7860}'/*##http://localhost:7860/*##http://localhost:8888/*"
            },
            "protocol": "openid-connect",
            "standardFlowEnabled": true,
            "implicitFlowEnabled": false,
            "directAccessGrantsEnabled": true,
            "serviceAccountsEnabled": false,
            "publicClient": false
        }'

        upsert_client "$token" "mcp-gateway-web" "$web_client_json"

        # Create M2M client
        local m2m_client_json='{
            "clientId": "mcp-gateway-m2m",
            "name": "MCP Gateway M2M Client",
            "enabled": true,
            "clientAuthenticatorType": "client-secret",
            "protocol": "openid-connect",
            "standardFlowEnabled": false,
            "implicitFlowEnabled": false,
            "directAccessGrantsEnabled": false,
            "serviceAccountsEnabled": true,
            "publicClient": false
        }'

        upsert_client "$token" "mcp-gateway-m2m" "$m2m_client_json"

        echo -e "${GREEN}Clients created successfully!${NC}"
    }

    # Function to create groups
    create_groups() {
        local token=$1

        echo "Creating user groups..."

        local groups=("mcp-registry-admin" "mcp-registry-user" "mcp-registry-developer" "mcp-registry-operator" "mcp-servers-unrestricted" "mcp-servers-restricted" "a2a-agent-admin" "a2a-agent-publisher" "a2a-agent-user")

        for group in "${groups[@]}"; do
            local group_json='{
                "name": "'$group'",
                "attributes": {
                    "description": ["'$group' group for MCP Gateway access"]
                }
            }'

            curl -s -X POST "${KEYCLOAK_URL}/admin/realms/mcp-gateway/groups" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "$group_json" > /dev/null
        done

        echo -e "${GREEN}Groups created successfully!${NC}"
    }

    # Function to create custom scopes
    create_scopes() {
        local token=$1

        echo "Creating custom MCP scopes..."

        local scopes=("mcp-servers-unrestricted/read" "mcp-servers-unrestricted/execute" "mcp-servers-restricted/read" "mcp-servers-restricted/execute" "mcp-registry-admin" "registry-admins")

        for scope in "${scopes[@]}"; do
            local scope_json='{
                "name": "'$scope'",
                "description": "MCP Gateway scope for '$scope' access",
                "protocol": "openid-connect"
            }'

            local response=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "$scope_json")

            if [ "$response" = "201" ]; then
                echo "  - Created scope: $scope"
            elif [ "$response" = "409" ]; then
                echo "  - Scope already exists: $scope"
            else
                echo -e "${RED}  - Failed to create scope: $scope (HTTP $response)${NC}"
            fi
        done

        echo -e "${GREEN}Custom scopes created successfully!${NC}"
    }

    # Function to assign scopes to M2M client
    setup_m2m_scopes() {
        local token=$1

        echo "Setting up M2M client scopes..."

        # Get M2M client ID
        local m2m_client_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=mcp-gateway-m2m" | \
            jq -r '.[0].id')

        if [ -z "$m2m_client_id" ] || [ "$m2m_client_id" = "null" ]; then
            echo -e "${RED}Error: Could not find mcp-gateway-m2m client${NC}"
            return 1
        fi

        # Get all available client scopes
        local scopes=("mcp-servers-unrestricted/read" "mcp-servers-unrestricted/execute" "mcp-servers-restricted/read" "mcp-servers-restricted/execute")

        for scope in "${scopes[@]}"; do
            # Get scope ID
            local scope_id=$(curl -s -H "Authorization: Bearer ${token}" \
                "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes" | \
                jq -r '.[] | select(.name=="'$scope'") | .id')

            if [ ! -z "$scope_id" ] && [ "$scope_id" != "null" ]; then
                # Add scope as default client scope
                local response=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${m2m_client_id}/default-client-scopes/${scope_id}" \
                    -H "Authorization: Bearer ${token}")

                if [ "$response" = "204" ]; then
                    echo "  - Assigned scope: $scope"
                else
                    echo -e "${YELLOW}  - Warning: Could not assign scope $scope (HTTP $response)${NC}"
                fi
            else
                echo -e "${RED}  - Error: Could not find scope: $scope${NC}"
            fi
        done

        echo -e "${GREEN}M2M client scopes configured successfully!${NC}"
    }

    # Function to create service account user for M2M client
    create_service_account_user() {
        local token=$1
        local service_account_username="service-account-mcp-gateway-m2m"

        echo "Creating service account user: $service_account_username"

        # Check if user already exists
        local existing_user=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/users?username=$service_account_username" | \
            jq -r '.[0].id // empty')

        if [ ! -z "$existing_user" ]; then
            echo -e "${YELLOW}Service account user already exists with ID: $existing_user${NC}"
            return 0
        fi

        # Create service account user
        local user_json='{
            "username": "'$service_account_username'",
            "enabled": true,
            "emailVerified": true,
            "serviceAccountClientId": "mcp-gateway-m2m"
        }'

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/users" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$user_json")

        if [ "$response" = "201" ]; then
            echo -e "${GREEN}Service account user created successfully!${NC}"

            # Get the newly created user ID
            local user_id=$(curl -s -H "Authorization: Bearer ${token}" \
                "${KEYCLOAK_URL}/admin/realms/${REALM}/users?username=$service_account_username" | \
                jq -r '.[0].id')

            echo "Created service account user with ID: $user_id"

            # Assign user to mcp-servers-unrestricted group
            local group_id=$(curl -s -H "Authorization: Bearer ${token}" \
                "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
                jq -r '.[] | select(.name=="mcp-servers-unrestricted") | .id')

            if [ ! -z "$group_id" ] && [ "$group_id" != "null" ]; then
                local group_response=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/$user_id/groups/$group_id" \
                    -H "Authorization: Bearer ${token}")

                if [ "$group_response" = "204" ]; then
                    echo -e "${GREEN}Service account assigned to mcp-servers-unrestricted group!${NC}"
                else
                    echo -e "${YELLOW}Warning: Could not assign service account to mcp-servers-unrestricted group (HTTP $group_response)${NC}"
                fi
            else
                echo -e "${RED}Error: Could not find mcp-servers-unrestricted group${NC}"
            fi

            # Assign user to a2a-agent-admin group for A2A agent access
            local a2a_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
                "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
                jq -r '.[] | select(.name=="a2a-agent-admin") | .id')

            if [ ! -z "$a2a_group_id" ] && [ "$a2a_group_id" != "null" ]; then
                local a2a_response=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/$user_id/groups/$a2a_group_id" \
                    -H "Authorization: Bearer ${token}")

                if [ "$a2a_response" = "204" ]; then
                    echo -e "${GREEN}Service account assigned to a2a-agent-admin group!${NC}"
                else
                    echo -e "${YELLOW}Warning: Could not assign service account to a2a-agent-admin group (HTTP $a2a_response)${NC}"
                fi
            else
                echo -e "${YELLOW}Warning: a2a-agent-admin group not found. Create it manually if A2A agent support is needed.${NC}"
            fi

            return 0
        elif [ "$response" = "409" ]; then
            echo -e "${YELLOW}Service account user already exists. Continuing...${NC}"
            return 0
        else
            echo -e "${RED}Failed to create service account user. HTTP status: ${response}${NC}"
            return 1
        fi
    }

    # Function to create test users
    # Upsert a realm user: create if missing, otherwise PUT a fresh password.
    # Without the password reset, helm upgrades silently drift the realm
    # password from whatever value the registry-login-credentials secret holds.
    upsert_user() {
        local token=$1
        local username=$2
        local password=$3
        local first_name=$4
        local last_name=$5

        local user_json=$(jq -n \
            --arg u "$username" \
            --arg e "${username}@example.com" \
            --arg p "$password" \
            --arg fn "$first_name" \
            --arg ln "$last_name" \
            '{
                username: $u,
                email: $e,
                enabled: true,
                emailVerified: true,
                firstName: $fn,
                lastName: $ln,
                credentials: [{type: "password", value: $p, temporary: false}]
            }')

        local status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/users" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$user_json")

        if [ "$status" = "201" ]; then
            echo "  - Created user: $username"
        elif [ "$status" = "409" ]; then
            # User already exists — look up id and reset password so the realm
            # stays in sync with the registry-login-credentials secret.
            local user_id=$(curl -s -H "Authorization: Bearer ${token}" \
                "${KEYCLOAK_URL}/admin/realms/${REALM}/users?username=$username&exact=true" | \
                jq -r '.[0].id // empty')
            if [ -z "$user_id" ]; then
                echo -e "${RED}  - 409 on POST but could not look up id for $username${NC}"
                return 1
            fi
            local reset_status=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/${user_id}/reset-password" \
                -H "Authorization: Bearer ${token}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"password\",\"value\":\"$password\",\"temporary\":false}")
            if [ "$reset_status" = "204" ]; then
                echo "  - Updated password for existing user: $username"
            else
                echo -e "${RED}  - Failed to reset password for $username (HTTP $reset_status)${NC}"
                return 1
            fi
        else
            echo -e "${RED}  - Failed to create/update user $username (HTTP $status)${NC}"
            return 1
        fi
    }

    create_users() {
        local token=$1

        echo "Creating realm users..."

        # Define usernames for consistency
        local admin_username="admin"
        local test_username="testuser"

        upsert_user "$token" "$admin_username" "${INITIAL_ADMIN_PASSWORD}" "Admin" "User"
        upsert_user "$token" "$test_username" "${INITIAL_USER_PASSWORD}" "Test" "User"

        echo "Assigning users to groups..."

        # Get user IDs
        local admin_user_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/users?username=$admin_username" | \
            jq -r '.[0].id')

        local test_user_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/users?username=$test_username" | \
            jq -r '.[0].id')

        # Get all group IDs
        local admin_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-registry-admin") | .id')

        local user_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-registry-user") | .id')

        local developer_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-registry-developer") | .id')

        local operator_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-registry-operator") | .id')

        local unrestricted_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-servers-unrestricted") | .id')

        local restricted_group_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/groups" | \
            jq -r '.[] | select(.name=="mcp-servers-restricted") | .id')

        # Define usernames for consistent logging
        local admin_username="admin"
        local test_username="testuser"

        # Assign admin user to admin group and unrestricted servers group
        if [ ! -z "$admin_user_id" ] && [ ! -z "$admin_group_id" ]; then
            curl -s -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/$admin_user_id/groups/$admin_group_id" \
                -H "Authorization: Bearer ${token}" > /dev/null
            echo "  - $admin_username assigned to mcp-registry-admin group"
        fi

        # Also assign admin to unrestricted servers group for full access
        if [ ! -z "$admin_user_id" ] && [ ! -z "$unrestricted_group_id" ]; then
            curl -s -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/$admin_user_id/groups/$unrestricted_group_id" \
                -H "Authorization: Bearer ${token}" > /dev/null
            echo "  - $admin_username assigned to mcp-servers-unrestricted group"
        fi

        # Assign test user to all groups except admin
        if [ ! -z "$test_user_id" ]; then
            # Arrays of group IDs and names for loop processing
            local group_ids=("$user_group_id" "$developer_group_id" "$operator_group_id" "$unrestricted_group_id" "$restricted_group_id")
            local group_names=("mcp-registry-user" "mcp-registry-developer" "mcp-registry-operator" "mcp-servers-unrestricted" "mcp-servers-restricted")

            # Loop through groups and assign test user to each
            for i in "${!group_ids[@]}"; do
                local group_id="${group_ids[$i]}"
                local group_name="${group_names[$i]}"

                if [ ! -z "$group_id" ]; then
                    curl -s -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/users/$test_user_id/groups/$group_id" \
                        -H "Authorization: Bearer ${token}" > /dev/null
                    echo "  - $test_username assigned to $group_name group"
                fi
            done
        fi

        echo -e "${GREEN}Users created and assigned to groups successfully!${NC}"
    }

    # Function to create client secrets
    setup_client_secrets() {
        local token=$1

        echo "Setting up client secrets..."

        # Get web client ID
        local web_client_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=mcp-gateway-web" | \
            jq -r '.[0].id')

        # Generate secret for web client
        curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${web_client_id}/client-secret" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" > /dev/null

        local web_secret_response=$(curl -s "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${web_client_id}/client-secret" \
            -H "Authorization: Bearer ${token}")
        web_secret=$(echo "$web_secret_response" | jq -r '.value // empty')

        # Get M2M client ID
        local m2m_client_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=mcp-gateway-m2m" | \
            jq -r '.[0].id')

        # Generate secret for M2M client
        curl -s -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${m2m_client_id}/client-secret" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" > /dev/null

        local m2m_secret_response=$(curl -s "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${m2m_client_id}/client-secret" \
            -H "Authorization: Bearer ${token}")
        m2m_secret=$(echo "$m2m_secret_response" | jq -r '.value // empty')

        echo -e "${GREEN}Client secrets generated!${NC}"
        echo ""
        echo "=============================================="
        echo -e "${YELLOW}Client credentials have been created.${NC}"
        echo "=============================================="
        echo ""
        echo -e "${GREEN}To retrieve all client credentials, run:${NC}"
        echo "  ./keycloak/setup/get-all-client-credentials.sh"
        echo ""
        echo "This will save all credentials to .oauth-tokens/"
        echo "=============================================="

        # Use --dry-run=client | apply so this is idempotent on helm upgrades
        # (this Job runs as a post-install + post-upgrade hook; kubectl create
        # by itself fails with AlreadyExists on re-run).
        kubectl create secret generic keycloak-client-secret \
          --from-literal=KEYCLOAK_CLIENT_ID=mcp-gateway-web \
          --from-literal=KEYCLOAK_CLIENT_SECRET=$web_secret \
          --from-literal=KEYCLOAK_M2M_CLIENT_ID=mcp-gateway-m2m \
          --from-literal=KEYCLOAK_M2M_CLIENT_SECRET=$m2m_secret \
          --dry-run=client -o yaml | kubectl apply -f -
    }

    # Function to setup groups mapper for OAuth2 clients
    setup_groups_mapper() {
        local token=$1

        echo "Setting up groups mapper for OAuth2 clients..."

        # Create groups mapper JSON
        local groups_mapper_json='{
            "name": "groups",
            "protocol": "openid-connect",
            "protocolMapper": "oidc-group-membership-mapper",
            "consentRequired": false,
            "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
            }
        }'

        # Setup groups mapper for mcp-gateway-web client
        echo "Setting up groups mapper for mcp-gateway-web client..."
        local web_client_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=mcp-gateway-web" | \
            jq -r '.[0].id')

        if [ -z "$web_client_id" ] || [ "$web_client_id" = "null" ]; then
            echo -e "${RED}Error: Could not find mcp-gateway-web client${NC}"
            return 1
        fi

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${web_client_id}/protocol-mappers/models" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$groups_mapper_json")

        if [ "$response" = "201" ]; then
            echo -e "${GREEN}Groups mapper created for mcp-gateway-web!${NC}"
        elif [ "$response" = "409" ]; then
            echo -e "${YELLOW}Groups mapper already exists for mcp-gateway-web. Continuing...${NC}"
        else
            echo -e "${RED}Failed to create groups mapper for mcp-gateway-web. HTTP status: ${response}${NC}"
            return 1
        fi

        # Setup groups mapper for mcp-gateway-m2m client
        echo "Setting up groups mapper for mcp-gateway-m2m client..."
        local m2m_client_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/clients?clientId=mcp-gateway-m2m" | \
            jq -r '.[0].id')

        if [ -z "$m2m_client_id" ] || [ "$m2m_client_id" = "null" ]; then
            echo -e "${RED}Error: Could not find mcp-gateway-m2m client${NC}"
            return 1
        fi

        local m2m_response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/clients/${m2m_client_id}/protocol-mappers/models" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$groups_mapper_json")

        if [ "$m2m_response" = "201" ]; then
            echo -e "${GREEN}Groups mapper created for mcp-gateway-m2m!${NC}"
        elif [ "$m2m_response" = "409" ]; then
            echo -e "${YELLOW}Groups mapper already exists for mcp-gateway-m2m. Continuing...${NC}"
        else
            echo -e "${RED}Failed to create groups mapper for mcp-gateway-m2m. HTTP status: ${m2m_response}${NC}"
            return 1
        fi
    }

    # =========================================================================
    # Dynamic Client Registration (RFC 7591) support
    # =========================================================================
    # Three configuration changes are needed so that MCP clients (Claude Code,
    # Claude.ai connectors, Cursor, etc.) can register themselves dynamically
    # and receive tokens that carry the user's groups for per-user authorization
    # at the gateway:
    #
    # 1. setup_dcr_groups_mapper / setup_dcr_audience_mapper - attach mappers
    #    to the `basic` client-scope. `basic` is auto-attached to every client
    #    (including DCR'd ones), so this is the only reliable place to put a
    #    mapper that runs for clients we don't pre-create.
    # 2. configure_dcr_allowed_scopes - widen the anonymous + authenticated DCR
    #    "Allowed Client Scopes" policies to accept all realm client-scopes.
    # 3. configure_dcr_trusted_hosts - relax the anonymous DCR "Trusted Hosts"
    #    policy so MCP clients running on diverse cloud egress IPs can register.

    setup_dcr_groups_mapper() {
        local token=$1

        echo "Attaching Groups protocol mapper to the 'basic' client-scope..."

        local basic_scope_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes" | \
            jq -r '.[] | select(.name=="basic") | .id')

        if [ -z "$basic_scope_id" ] || [ "$basic_scope_id" = "null" ]; then
            echo -e "${YELLOW}WARNING: 'basic' client-scope not found — skipping DCR groups mapper.${NC}"
            return 0
        fi

        local existing=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes/${basic_scope_id}" | \
            jq -r '.protocolMappers[]? | select(.name=="groups") | .id')

        if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            echo -e "${YELLOW}Groups mapper already attached to 'basic' scope. Skipping.${NC}"
            return 0
        fi

        local groups_mapper_json='{
            "name": "groups",
            "protocol": "openid-connect",
            "protocolMapper": "oidc-group-membership-mapper",
            "consentRequired": false,
            "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
            }
        }'

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes/${basic_scope_id}/protocol-mappers/models" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$groups_mapper_json")

        if [ "$response" = "201" ]; then
            echo -e "${GREEN}Groups mapper attached to 'basic' scope. DCR'd clients will receive groups in tokens.${NC}"
        elif [ "$response" = "409" ]; then
            echo -e "${YELLOW}Groups mapper already exists on 'basic' scope. Continuing...${NC}"
        else
            echo -e "${RED}Failed to attach Groups mapper to 'basic'. HTTP status: ${response}${NC}"
            return 1
        fi
    }

    setup_dcr_audience_mapper() {
        local token=$1

        echo "Attaching Audience protocol mapper to the 'basic' client-scope..."

        local basic_scope_id=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes" | \
            jq -r '.[] | select(.name=="basic") | .id')

        if [ -z "$basic_scope_id" ] || [ "$basic_scope_id" = "null" ]; then
            echo -e "${YELLOW}WARNING: 'basic' client-scope not found — skipping DCR audience mapper.${NC}"
            return 0
        fi

        local existing=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes/${basic_scope_id}" | \
            jq -r '.protocolMappers[]? | select(.name=="mcp-gateway-audience") | .id')

        if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            echo -e "${YELLOW}Audience mapper already attached. Skipping.${NC}"
            return 0
        fi

        local audience_mapper_json='{
            "name": "mcp-gateway-audience",
            "protocol": "openid-connect",
            "protocolMapper": "oidc-audience-mapper",
            "consentRequired": false,
            "config": {
                "included.custom.audience": "mcp-gateway",
                "id.token.claim": "false",
                "access.token.claim": "true"
            }
        }'

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes/${basic_scope_id}/protocol-mappers/models" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$audience_mapper_json")

        if [ "$response" = "201" ]; then
            echo -e "${GREEN}Audience mapper attached. DCR'd-client tokens will carry aud=\"mcp-gateway\".${NC}"
        elif [ "$response" = "409" ]; then
            echo -e "${YELLOW}Audience mapper already exists. Continuing...${NC}"
        else
            echo -e "${RED}Failed to attach Audience mapper. HTTP status: ${response}${NC}"
            return 1
        fi
    }

    # Widen one subType's "Allowed Client Scopes" policy to include every
    # client-scope defined in the realm. Both 'anonymous' and 'authenticated'
    # subTypes need this because Keycloak picks one based on whether the DCR
    # request carries an initial-access / registration token.
    _widen_allowed_scopes_policy() {
        local token=$1
        local sub_type=$2
        local components=$3
        local all_scope_names=$4

        local policy_id=$(echo "$components" | \
            jq -r ".[] | select(.name==\"Allowed Client Scopes\" and .subType==\"${sub_type}\") | .id")
        local parent_id=$(echo "$components" | \
            jq -r ".[] | select(.name==\"Allowed Client Scopes\" and .subType==\"${sub_type}\") | .parentId")

        if [ -z "$policy_id" ] || [ "$policy_id" = "null" ]; then
            echo -e "${YELLOW}WARNING: ${sub_type} 'Allowed Client Scopes' policy not found — skipping.${NC}"
            return 0
        fi

        local policy_json=$(jq -n \
            --arg name "Allowed Client Scopes" \
            --arg providerId "allowed-client-templates" \
            --arg providerType "org.keycloak.services.clientregistration.policy.ClientRegistrationPolicy" \
            --arg parentId "$parent_id" \
            --arg subType "$sub_type" \
            --argjson allowedScopes "$all_scope_names" \
            '{
                name: $name,
                providerId: $providerId,
                providerType: $providerType,
                parentId: $parentId,
                subType: $subType,
                config: {
                    "allow-default-scopes": ["true"],
                    "allowed-client-scopes": $allowedScopes
                }
            }')

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/components/${policy_id}" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$policy_json")

        if [ "$response" = "204" ]; then
            echo -e "${GREEN}${sub_type} Allowed Client Scopes policy includes all realm scopes.${NC}"
        else
            echo -e "${RED}FAILED (${sub_type}): HTTP status ${response}${NC}"
            return 1
        fi
    }

    configure_dcr_allowed_scopes() {
        local token=$1

        echo "Widening 'Allowed Client Scopes' DCR policy (anonymous + authenticated)..."

        local components=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/components?type=org.keycloak.services.clientregistration.policy.ClientRegistrationPolicy")

        local all_scope_names=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/client-scopes" | \
            jq -c '[.[].name]')

        _widen_allowed_scopes_policy "$token" "anonymous" "$components" "$all_scope_names" || return 1
        _widen_allowed_scopes_policy "$token" "authenticated" "$components" "$all_scope_names" || return 1
    }

    configure_dcr_trusted_hosts() {
        local token=$1

        echo "Relaxing anonymous-DCR 'Trusted Hosts' policy..."

        local components=$(curl -s -H "Authorization: Bearer ${token}" \
            "${KEYCLOAK_URL}/admin/realms/${REALM}/components?type=org.keycloak.services.clientregistration.policy.ClientRegistrationPolicy")

        local policy_id=$(echo "$components" | \
            jq -r '.[] | select(.name=="Trusted Hosts" and .subType=="anonymous") | .id')
        local parent_id=$(echo "$components" | \
            jq -r '.[] | select(.name=="Trusted Hosts" and .subType=="anonymous") | .parentId')

        if [ -z "$policy_id" ] || [ "$policy_id" = "null" ]; then
            echo -e "${RED}Error: Could not find anonymous 'Trusted Hosts' policy${NC}"
            return 1
        fi

        # IP-must-match check off (MCP clients run from diverse cloud IPs).
        # URI-must-match stays on with `localhost` trusted for OAuth callbacks.
        local policy_json='{
            "name": "Trusted Hosts",
            "providerId": "trusted-hosts",
            "providerType": "org.keycloak.services.clientregistration.policy.ClientRegistrationPolicy",
            "parentId": "'"$parent_id"'",
            "subType": "anonymous",
            "config": {
                "host-sending-registration-request-must-match": ["false"],
                "client-uris-must-match": ["true"],
                "trusted-hosts": ["localhost", "127.0.0.1", "claude.ai"]
            }
        }'

        local response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT "${KEYCLOAK_URL}/admin/realms/${REALM}/components/${policy_id}" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            -d "$policy_json")

        if [ "$response" = "204" ]; then
            echo -e "${GREEN}Trusted Hosts policy relaxed (IP check off, URI check on, localhost allowed).${NC}"
        else
            echo -e "${RED}Failed to update Trusted Hosts policy. HTTP status: ${response}${NC}"
            return 1
        fi
    }

    # Function to generate random password
    generate_password() {
        # Generate a 16-character random password with alphanumeric characters
        openssl rand -base64 12 | tr -d "=+/" | cut -c1-16
    }

    # Main execution
    main() {
        # Get script directory and find .env file
        SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        PROJECT_ROOT="$( cd "$SCRIPT_DIR/../.." && pwd )"
        ENV_FILE="$PROJECT_ROOT/.env"

        # Load environment variables from .env file if it exists
        if [ -f "$ENV_FILE" ]; then
            echo "Loading environment variables from $ENV_FILE..."
            set -a  # Automatically export all variables
            source "$ENV_FILE"
            set +a  # Turn off automatic export
            echo "Environment variables loaded successfully"
        else
            echo "No .env file found at $ENV_FILE"
            echo "Current directory: $(pwd)"
            echo "Script directory: $SCRIPT_DIR"
            echo "Project root: $PROJECT_ROOT"
        fi

        # Resolve registry user passwords. Order of precedence:
        #   1. Caller-exported INITIAL_ADMIN_PASSWORD / INITIAL_USER_PASSWORD
        #      (e.g. operator-supplied via --set-string).
        #   2. Existing registry-login-credentials secret (helm upgrade case —
        #      preserve passwords across re-runs so users don't get rotated
        #      out from under their already-stored credentials).
        #   3. Freshly generated (first install case).
        # Without (2), every helm upgrade rotates the secret and (because the
        # realm user POST returns 409) the realm keeps the OLD password while
        # the secret advertises the new one. Operators lose the ability to log
        # in until they reset by hand.
        if [ -z "$INITIAL_ADMIN_PASSWORD" ]; then
            existing_admin=$(kubectl get secret registry-login-credentials \
                -o jsonpath='{.data.REGISTRY_ADMIN_PASSWORD}' 2>/dev/null \
                | base64 -d 2>/dev/null || true)
            if [ -n "$existing_admin" ]; then
                INITIAL_ADMIN_PASSWORD="$existing_admin"
                echo "Reusing admin password from existing registry-login-credentials secret"
            else
                INITIAL_ADMIN_PASSWORD=$(generate_password)
                echo -e "${YELLOW}Generated new admin password (first install)${NC}"
            fi
        fi

        if [ -z "$INITIAL_USER_PASSWORD" ]; then
            existing_user=$(kubectl get secret registry-login-credentials \
                -o jsonpath='{.data.REGISTRY_USER_PASSWORD}' 2>/dev/null \
                | base64 -d 2>/dev/null || true)
            if [ -n "$existing_user" ]; then
                INITIAL_USER_PASSWORD="$existing_user"
                echo "Reusing testuser password from existing registry-login-credentials secret"
            else
                INITIAL_USER_PASSWORD=$(generate_password)
                echo -e "${YELLOW}Generated new testuser password (first install)${NC}"
            fi
        fi

        # Store passwords in variables for later use
        export INITIAL_ADMIN_PASSWORD
        export INITIAL_USER_PASSWORD

        # Override KEYCLOAK_URL with KEYCLOAK_ADMIN_URL for API calls
        KEYCLOAK_URL="${KEYCLOAK_ADMIN_URL:-http://localhost:8080}"
        KEYCLOAK_ADMIN="${KEYCLOAK_ADMIN:-admin}"
        echo "Using Keycloak API URL: $KEYCLOAK_URL"

        # Check if admin password is set
        if [ -z "$KEYCLOAK_ADMIN_PASSWORD" ]; then
            echo -e "${RED}Error: KEYCLOAK_ADMIN_PASSWORD environment variable is not set${NC}"
            echo "Please set it in .env file or export it before running this script"
            exit 1
        fi

        # Wait for Keycloak to be ready
        wait_for_keycloak

        # Get admin token
        echo "Authenticating with Keycloak..."
        TOKEN=$(get_admin_token)

        if [ -z "$TOKEN" ]; then
            echo -e "${RED}Error: Failed to authenticate with Keycloak${NC}"
            echo "Please check your admin credentials"
            exit 1
        fi

        echo -e "${GREEN}Authentication successful!${NC}"

        # Create realm and configure it step by step
        if create_realm "$TOKEN"; then
            create_clients "$TOKEN"
            create_scopes "$TOKEN"
            create_groups "$TOKEN"
            create_users "$TOKEN"
            create_service_account_user "$TOKEN"
            setup_client_secrets "$TOKEN"
            setup_groups_mapper "$TOKEN"
            setup_m2m_scopes "$TOKEN"

            # MCP DCR support: groups + audience mappers on `basic` scope
            # (reliably attached to every DCR'd client), Allowed Client Scopes
            # widened, Trusted Hosts relaxed for cloud-egress MCP clients.
            # Order matters: scopes (create_scopes) must run before
            # configure_dcr_allowed_scopes, since the policy is widened to the
            # union of all realm scopes that exist at policy-update time.
            #
            # Gated by ENABLE_DCR_CONFIG (chart value: dcr.enabled). Disable
            # for deployments using a pre-configured external Keycloak or
            # closed deployments that don't need RFC 7591 DCR.
            if [ "${ENABLE_DCR_CONFIG:-false}" = "true" ]; then
                echo ""
                echo -e "${YELLOW}=== Configuring Keycloak realm for MCP Dynamic Client Registration ===${NC}"
                setup_dcr_groups_mapper "$TOKEN"
                setup_dcr_audience_mapper "$TOKEN"
                configure_dcr_allowed_scopes "$TOKEN"
                configure_dcr_trusted_hosts "$TOKEN"
            else
                echo ""
                echo -e "${YELLOW}DCR realm setup skipped (ENABLE_DCR_CONFIG=${ENABLE_DCR_CONFIG:-false}).${NC}"
                echo "Set keycloak-configure.dcr.enabled=true in chart values to enable."
            fi
        else
            exit 1
        fi

        # Save passwords to a Kubernetes secret. Uses `apply` so the Job can
        # be re-run by the post-install/post-upgrade Helm hook without failing
        # with AlreadyExists.
        #
        # Drift-free across re-runs because: (1) main() reuses passwords from
        # this same secret when it already exists, and (2) upsert_user() PUTs
        # /reset-password on 409 so the realm side picks up the same value.
        kubectl create secret generic registry-login-credentials \
          --from-literal=REGISTRY_ADMIN_NAME=admin \
          --from-literal=REGISTRY_ADMIN_PASSWORD=$INITIAL_ADMIN_PASSWORD \
          --from-literal=REGISTRY_USER_NAME=testuser \
          --from-literal=REGISTRY_USER_PASSWORD=$INITIAL_USER_PASSWORD \
          --dry-run=client -o yaml | kubectl apply -f -

        echo ""
        echo -e "${GREEN}Keycloak initialization complete!${NC}"
        echo ""
        echo "You can now access Keycloak at: ${KEYCLOAK_URL}"
        echo "Admin console: ${KEYCLOAK_URL}/admin"
        echo "Realm: ${REALM}"
        echo ""
        echo "Default users created:"
        echo "  - admin/${INITIAL_ADMIN_PASSWORD} (admin access)"
        echo "  - testuser/${INITIAL_USER_PASSWORD} (user access)"
        echo ""
        echo -e "${YELLOW}IMPORTANT: Save these passwords! They are randomly generated.${NC}"
        echo -e "${YELLOW}Passwords have been saved to the Kubernetes secret: registry-login-credentials${NC}"
        echo -e "${YELLOW}Consider changing them after first login for security.${NC}"
    }

    # Run main function
    main
