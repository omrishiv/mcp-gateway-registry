suite: egress credential vault config
templates:
  - templates/configmap-egress.yaml
tests:
  - it: is absent when egressAuth is disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders only the auth-server subset when enabled
    set:
      egressAuth:
        enabled: true
        registryInternalUrl: http://registry:8080
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: auth-server-egress-config
      - equal:
          path: data.EGRESS_AUTH_ENABLED
          value: "true"
      - equal:
          path: data.EGRESS_REGISTRY_INTERNAL_URL
          value: "http://registry:8080"
      # Auth-server does NOT touch the secret store: these must be absent.
      - notExists:
          path: data.SECRET_STORE_BACKEND
      - notExists:
          path: data.OPENBAO_ADDR
      - notExists:
          path: data.AUTH_SERVER_NGINX_MARKER_SECRET
