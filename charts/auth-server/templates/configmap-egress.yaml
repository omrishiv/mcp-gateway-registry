{{- /*
Per-user egress credential vault — NON-secret config.

Rendered only when egressAuth.enabled. The auth-server needs ONLY the feature
flag + the internal vend URL (it calls the registry's /_egress_internal vend
endpoint); it does NOT touch the secret store, so no SECRET_STORE/AWS/OPENBAO
vars here. The marker secret (AUTH_SERVER_NGINX_MARKER_SECRET) lives in the
chart-managed env secret / the stack shared-secret. Wired in via
`envFrom: configMapRef` in deployment.yaml.
*/ -}}
{{- if .Values.egressAuth.enabled }}
{{- /*
EGRESS_OAUTH_CALLBACK_BASE_URL: the auth-server imports registry.core.config,
whose startup validation REQUIRES this whenever EGRESS_AUTH_ENABLED=true (it
raises ValueError otherwise and the pod crash-loops). The auth-server never uses
the value itself, but it must be present + non-empty to pass validation. Derive
it from global.domain + the ingress routing mode exactly like the registry's
configmap-egress.yaml so both pods agree on the public callback host. An explicit
egressAuth.oauthCallbackBaseUrl wins.
*/ -}}
{{- $ingress := .Values.global.ingress | default dict }}
{{- $routingMode := $ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default "localhost" }}
{{- $protocol := ternary "https" "http" ($ingress.tls | default false) }}
{{- $derivedCallbackBaseUrl := "" }}
{{- if eq $routingMode "path" }}
  {{- $derivedCallbackBaseUrl = printf "%s://%s" $protocol $domain }}
{{- else }}
  {{- $derivedCallbackBaseUrl = printf "%s://mcpregistry.%s" $protocol $domain }}
{{- end }}
{{- $callbackBaseUrl := .Values.egressAuth.oauthCallbackBaseUrl | default $derivedCallbackBaseUrl }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-server-egress-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
data:
  EGRESS_AUTH_ENABLED: {{ .Values.egressAuth.enabled | toString | quote }}
  EGRESS_REGISTRY_INTERNAL_URL: {{ .Values.egressAuth.registryInternalUrl | default "http://registry:8000" | quote }}
  EGRESS_OAUTH_CALLBACK_BASE_URL: {{ $callbackBaseUrl | quote }}
{{- end }}
