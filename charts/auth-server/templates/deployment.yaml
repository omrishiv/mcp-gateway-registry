{{- /* Determine auth provider type - prefer global, fallback to local, default to keycloak */ -}}
{{- $authProviderType := .Values.authProvider.type | default "keycloak" }}
{{- if .Values.global.authProvider }}
  {{- $authProviderType = .Values.global.authProvider.type | default $authProviderType }}
{{- end }}
{{- /* Resolve image coordinates: per-service image.* overrides global.image.* when set */ -}}
{{- $imgRegistry := default .Values.global.image.registry .Values.image.registry }}
{{- $imgRepository := required "image.repository must be set" .Values.image.repository }}
{{- $imgTag := default .Values.global.image.tag .Values.image.tag }}
{{- $imgPullPolicy := default .Values.global.image.pullPolicy .Values.image.pullPolicy }}
{{- /* Fail-fast validation of user-supplied extraEnv */ -}}
{{- include "auth-server.validateExtraEnv" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
      app.kubernetes.io/component: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/component: {{ .Values.app.name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ $imgRegistry }}/{{ $imgRepository }}:{{ $imgTag }}"
          imagePullPolicy: {{ $imgPullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
            - containerPort: 9464
              name: metrics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: auth-server-app-log-config
            - secretRef:
                name: {{ .Values.app.existingSecret | default .Values.app.envSecretName }}
            {{- if eq $authProviderType "keycloak" }}
            - secretRef:
                name: keycloak-client-secret
            {{- end }}
            - secretRef:
                name: {{ .Values.global.existingMongoCredentialsSecret | default "mongo-credentials" }}
            {{- if .Values.global.sharedSecretName }}
            - secretRef:
                name: {{ .Values.global.existingSharedSecret | default .Values.global.sharedSecretName }}
            {{- end }}
            {{- if .Values.global.oauthProviderSecretName }}
            - secretRef:
                name: {{ .Values.global.existingOauthProviderSecret | default .Values.global.oauthProviderSecretName }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.entra.clientSecretExistingSecret }}
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.entra.clientSecretExistingSecret }}
                  key: {{ .Values.entra.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.clientSecretExistingSecret }}
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.clientSecretExistingSecret }}
                  key: {{ .Values.okta.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.m2mClientSecretExistingSecret }}
            - name: OKTA_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.m2mClientSecretExistingSecret }}
                  key: {{ .Values.okta.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.apiTokenExistingSecret }}
            - name: OKTA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.apiTokenExistingSecret }}
                  key: {{ .Values.okta.apiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.clientSecretExistingSecret }}
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.clientSecretExistingSecret }}
                  key: {{ .Values.auth0.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.m2mClientSecretExistingSecret }}
            - name: AUTH0_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.m2mClientSecretExistingSecret }}
                  key: {{ .Values.auth0.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.managementApiTokenExistingSecret }}
            - name: AUTH0_MANAGEMENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.managementApiTokenExistingSecret }}
                  key: {{ .Values.auth0.managementApiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.pingfederate.clientSecretExistingSecret }}
            - name: PINGFEDERATE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pingfederate.clientSecretExistingSecret }}
                  key: {{ .Values.pingfederate.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.pingfederate.m2mClientSecretExistingSecret }}
            - name: PINGFEDERATE_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pingfederate.m2mClientSecretExistingSecret }}
                  key: {{ .Values.pingfederate.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if eq $authProviderType "pingfederate" }}
            - name: PINGFEDERATE_ENABLED
              value: "true"
            - name: PINGFEDERATE_BASE_URL
              value: {{ .Values.pingfederate.baseUrl | quote }}
            - name: PINGFEDERATE_EXTERNAL_URL
              value: {{ .Values.pingfederate.externalUrl | quote }}
            - name: PINGFEDERATE_CLIENT_ID
              value: {{ .Values.pingfederate.clientId | quote }}
            {{- if .Values.pingfederate.m2mClientId }}
            - name: PINGFEDERATE_M2M_CLIENT_ID
              value: {{ .Values.pingfederate.m2mClientId | quote }}
            {{- end }}
            {{- if .Values.pingfederate.applicationIdUri }}
            - name: PINGFEDERATE_APPLICATION_ID_URI
              value: {{ .Values.pingfederate.applicationIdUri | quote }}
            {{- end }}
            - name: PINGFEDERATE_GROUPS_CLAIM
              value: {{ .Values.pingfederate.groupsClaim | default "groups" | quote }}
            {{- end }}
            # OTel-native metric emission (Issue #1122)
            - name: METRICS_LEGACY_HTTP_POST
              value: {{ .Values.metrics.legacyHttpPost | default false | quote }}
            - name: OTEL_METRIC_EXPORT_INTERVAL_MS
              value: {{ .Values.metrics.otelExportIntervalMs | default "15000" | quote }}
            - name: OTEL_EXPORTER_PROMETHEUS_HOST
              value: {{ .Values.metrics.exporterPrometheusHost | default "0.0.0.0" | quote }}
            - name: OTEL_EXPORTER_PROMETHEUS_PORT
              value: {{ .Values.metrics.exporterPrometheusPort | default "9464" | quote }}
            {{- if .Values.metrics.otelExporterOtlpEndpoint }}
            # Standard OTel SDK var: activates the OTLP push exporter when set.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.metrics.otelExporterOtlpEndpoint | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
