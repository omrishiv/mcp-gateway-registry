{{- $existingSecret := .Values.mongodb.existingSecret | default .Values.global.existingMongoCredentialsSecret }}
{{- if not $existingSecret }}
{{- /*
  DOCUMENTDB_PASSWORD resolution (when not using connectionString):
    1. .Values.mongodb.password (explicit override) — verbatim
    2. existing mongo-credentials.DOCUMENTDB_PASSWORD — preserve on upgrade
    3. existing my-user-password.password — one-time migration — first install
  Rules 2 and 3 are why we use `lookup`: without them, every helm upgrade
  would silently rotate the password and desync from the SCRAM credential
  the MongoDB Community Operator already provisioned.
  This Secret is the SINGLE source of truth for the password — the
  MongoDBCommunity operator's passwordSecretRef points here too.
*/}}
{{- $mongodbPassword := "" }}
{{- if not .Values.mongodb.connectionString }}
  {{- if .Values.mongodb.password }}
    {{- $mongodbPassword = .Values.mongodb.password }}
  {{- else }}
    {{- $existingMongoCreds := lookup "v1" "Secret" .Release.Namespace "mongo-credentials" }}
    {{- if and $existingMongoCreds (hasKey ($existingMongoCreds.data | default dict) "DOCUMENTDB_PASSWORD") }}
      {{- $mongodbPassword = index $existingMongoCreds.data "DOCUMENTDB_PASSWORD" | b64dec }}
    {{- else }}
      {{- $existingUserPw := lookup "v1" "Secret" .Release.Namespace "my-user-password" }}
      {{- if and $existingUserPw (hasKey ($existingUserPw.data | default dict) "password") }}
        {{- $mongodbPassword = index $existingUserPw.data "password" | b64dec }}
      {{- else }}
        {{- $mongodbPassword = randAlphaNum 64 }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: mongo-credentials
  namespace: {{ .Release.Namespace | quote }}
data:
  DOCUMENTDB_DATABASE: {{.Values.mongodb.database | b64enc | quote}}
  DOCUMENTDB_NAMESPACE: {{.Values.mongodb.namespace | b64enc | quote}}
  DOCUMENTDB_USE_TLS: {{.Values.mongodb.use_tls | toString | b64enc | quote}}
  STORAGE_BACKEND: {{.Values.mongodb.storage_backend | b64enc | quote}}
  {{- if .Values.mongodb.connectionString }}
  # Connection string override: caller owns the full URI. Discrete
  # HOST/PORT/USERNAME/PASSWORD keys are omitted to avoid a second
  # source of truth.
  MONGODB_CONNECTION_STRING: {{.Values.mongodb.connectionString | b64enc | quote}}
  {{- else }}
  DOCUMENTDB_HOST: {{ if contains "." .Values.mongodb.host }}{{ .Values.mongodb.host | b64enc | quote }}{{ else }}{{ printf "%s.%s.svc.cluster.local" .Values.mongodb.host .Release.Namespace | b64enc | quote }}{{ end }}
  DOCUMENTDB_PASSWORD: {{ $mongodbPassword | b64enc | quote }}
  DOCUMENTDB_PORT: {{.Values.mongodb.port | toString | b64enc | quote}}
  DOCUMENTDB_REPLICA_SET: {{.Values.mongodb.replica_set | b64enc | quote}}
  DOCUMENTDB_USERNAME: {{.Values.mongodb.username | b64enc | quote}}
  {{- end }}
type: Opaque
{{- end }}
