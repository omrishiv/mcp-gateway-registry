# Optional Keycloak ingress — escape hatch for deployments that need a
# dedicated public hostname for Keycloak. Disabled by default because
# the registry pod's in-cluster nginx proxy already fronts Keycloak at
# /keycloak/, /realms/, /resources/ on the registry ingress, so most
# deployments do not need this.
#
# Subdomain mode: host = keycloak.<domain>, path = /. Keycloak serves
# from its own root (required by the stack's validator) so paths like
# /realms/... and /admin work out of the box.
#
# Path mode: requires keycloak.httpRelativePath != / to avoid
# path-conflict with other charts on the shared ALB. The stack's
# validator rejects anything other than /, so the two are mutually
# exclusive — enabling keycloakIngress in path mode will fail the
# render with a clear error below.
{{- if eq .Values.global.authProvider.type "keycloak" }}
{{- if .Values.keycloakIngress.enabled }}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $pathPrefix := .Values.global.ingress.paths.keycloak | default "/keycloak" }}
{{- if eq $routingMode "path" }}
  {{- fail "keycloakIngress.enabled=true is only supported in subdomain routing mode. In path mode the registry pod's in-cluster nginx already exposes Keycloak through the registry ingress at the /keycloak path — no extra ingress is needed. See charts/registry/templates/ingress.yaml." -}}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keycloak
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/success-codes: 200,302
    {{- if .Values.global.ingress.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.global.ingress.inboundCidrs }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.global.ingress.className }}
  rules:
    - host: keycloak.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keycloak-headless
                port:
                  number: 8080
{{- end }}
{{- end }}
