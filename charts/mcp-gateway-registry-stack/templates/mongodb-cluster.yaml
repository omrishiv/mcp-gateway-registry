{{- /*
  Skip rendering the in-cluster MongoDB when the user supplies an external
  connection string — they're managing their own MongoDB and the operator
  shouldn't run.
*/}}
{{ if and .Values.mongodb.enabled (not .Values.mongodb.connectionString) }}
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: {{ .Values.mongodb.host | default "mcp-registry-mongodb" }}
  namespace: {{ .Release.Namespace | quote }}
spec:
  members: {{ .Values.mongodb.replicas | default 3 }}
  type: ReplicaSet
  version: {{ .Values.mongodb.version | default "8.0.16" | quote }}
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: {{ .Values.mongodb.user }}
      db: admin
      {{- /*
        Operator reads the user password by reference from mongo-credentials
        (key DOCUMENTDB_PASSWORD), the same Secret consumers use via envFrom.
        Single source of truth — no copy, no drift. existingPasswordSecret
        remains supported for BYO operator credentials (legacy key: password).
      */}}
      passwordSecretRef:
        {{- if .Values.mongodb.existingPasswordSecret }}
        name: {{ .Values.mongodb.existingPasswordSecret }}
        key: password
        {{- else }}
        name: {{ .Values.global.existingMongoCredentialsSecret | default "mongo-credentials" }}
        key: DOCUMENTDB_PASSWORD
        {{- end }}
      roles:
        - name: clusterAdmin
          db: admin
        - name: root
          db: admin
        - name: userAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: my-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
  {{- with .Values.global.nodeSelector }}
  statefulSet:
    spec:
      template:
        spec:
          nodeSelector:
            {{- toYaml . | nindent 12 }}
  {{- end }}
{{ end }}
