{{/*
Shared secret for auth-server and registry.
Generates random values if not provided via global values.
Both services reference this single secret for SECRET_KEY and federation tokens.
*/}}
{{- if not .Values.global.existingSharedSecret }}
{{- $secretName := .Values.global.sharedSecretName | default "shared-secret" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $secretKey := "" }}
{{- if .Values.global.secretKey }}
  {{- $secretKey = .Values.global.secretKey }}
{{- else if $existingSecret }}
  {{- $secretKey = index $existingSecret.data "SECRET_KEY" | b64dec }}
{{- else }}
  {{- $secretKey = randAlphaNum 64 }}
{{- end }}
{{- /* Resolve federation values */ -}}
{{- $federationEnabled := false }}
{{- $federationStaticTokenRaw := "" }}
{{- $federationEncryptionKeyRaw := "" }}
{{- $registryId := "" }}
{{- if .Values.global.federation }}
  {{- $federationEnabled = .Values.global.federation.staticTokenAuthEnabled | default false }}
  {{- $federationStaticTokenRaw = .Values.global.federation.staticToken | default "" }}
  {{- $federationEncryptionKeyRaw = .Values.global.federation.encryptionKey | default "" }}
  {{- $registryId = .Values.global.federation.registryId | default "" }}
{{- end }}
{{- /* Reuse existing values from secret on upgrade, or generate new ones */ -}}
{{- $federationStaticToken := "" }}
{{- $federationEncryptionKey := "" }}
{{- if $federationStaticTokenRaw }}
  {{- $federationStaticToken = $federationStaticTokenRaw }}
{{- else if and $existingSecret (index $existingSecret.data "FEDERATION_STATIC_TOKEN") }}
  {{- $federationStaticToken = index $existingSecret.data "FEDERATION_STATIC_TOKEN" | b64dec }}
{{- else }}
  {{- $federationStaticToken = randBytes 32 | replace "+" "-" | replace "/" "_" | trimSuffix "=" }}
{{- end }}
{{- if $federationEncryptionKeyRaw }}
  {{- $federationEncryptionKey = $federationEncryptionKeyRaw }}
{{- else if and $existingSecret (index $existingSecret.data "FEDERATION_ENCRYPTION_KEY") }}
  {{- $federationEncryptionKey = index $existingSecret.data "FEDERATION_ENCRYPTION_KEY" | b64dec }}
{{- else }}
  {{- $federationEncryptionKey = randBytes 32 }}
{{- end }}
{{- /* Egress B2-4b nginx marker secret. Shared by registry + auth-server (it
       must match on both, like SECRET_KEY). Only materialized when egress is
       enabled on either subchart; explicit value wins, else reuse-on-upgrade,
       else generate. */ -}}
{{- $egressEnabled := false }}
{{- if and .Values.registry .Values.registry.egressAuth }}
  {{- $egressEnabled = .Values.registry.egressAuth.enabled | default false }}
{{- end }}
{{- if and (not $egressEnabled) (index .Values "auth-server") (index .Values "auth-server").egressAuth }}
  {{- $egressEnabled = (index .Values "auth-server").egressAuth.enabled | default false }}
{{- end }}
{{- $egressMarkerRaw := "" }}
{{- if and .Values.registry .Values.registry.egressAuth }}
  {{- $egressMarkerRaw = .Values.registry.egressAuth.markerSecret | default "" }}
{{- end }}
{{- $egressMarker := "" }}
{{- if $egressMarkerRaw }}
  {{- $egressMarker = $egressMarkerRaw }}
{{- else if and $existingSecret (index $existingSecret.data "AUTH_SERVER_NGINX_MARKER_SECRET") }}
  {{- $egressMarker = index $existingSecret.data "AUTH_SERVER_NGINX_MARKER_SECRET" | b64dec }}
{{- else }}
  {{- $egressMarker = randBytes 32 | replace "+" "-" | replace "/" "_" | trimSuffix "=" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "mcp-gateway-registry-stack.labels" . | nindent 4 }}
type: Opaque
data:
  SECRET_KEY: {{ $secretKey | b64enc | quote }}
  {{- if $egressEnabled }}
  AUTH_SERVER_NGINX_MARKER_SECRET: {{ $egressMarker | b64enc | quote }}
  {{- end }}
  {{- /* Resolve registry app values for federation and ASOR */ -}}
  {{- $fedTokenEndpoint := "" }}
  {{- $fedClientId := "" }}
  {{- $fedClientSecret := "" }}
  {{- $asorAccessToken := "" }}
  {{- $workdayTokenUrl := "" }}
  {{- if .Values.registry }}
    {{- if .Values.registry.app }}
      {{- $fedTokenEndpoint = .Values.registry.app.federationTokenEndpoint | default "" }}
      {{- $fedClientId = .Values.registry.app.federationClientId | default "" }}
      {{- $fedClientSecret = .Values.registry.app.federationClientSecret | default "" }}
      {{- $asorAccessToken = .Values.registry.app.asorAccessToken | default "" }}
      {{- $workdayTokenUrl = .Values.registry.app.workdayTokenUrl | default "" }}
    {{- end }}
  {{- end }}
  {{- if $federationEnabled }}
  FEDERATION_STATIC_TOKEN_AUTH_ENABLED: {{ $federationEnabled | toString | b64enc | quote }}
  FEDERATION_STATIC_TOKEN: {{ $federationStaticToken | b64enc | quote }}
  FEDERATION_ENCRYPTION_KEY: {{ $federationEncryptionKey | b64enc | quote }}
  {{- if $fedTokenEndpoint }}
  FEDERATION_TOKEN_ENDPOINT: {{ $fedTokenEndpoint | b64enc | quote }}
  {{- end }}
  {{- if $fedClientId }}
  FEDERATION_CLIENT_ID: {{ $fedClientId | b64enc | quote }}
  {{- end }}
  {{- if $fedClientSecret }}
  FEDERATION_CLIENT_SECRET: {{ $fedClientSecret | b64enc | quote }}
  {{- end }}
  {{- end }}
  {{- if $registryId }}
  REGISTRY_ID: {{ $registryId | b64enc | quote }}
  {{- end }}
  {{- /* ASOR/Workday integration (independent of federation) */ -}}
  {{- if $asorAccessToken }}
  ASOR_ACCESS_TOKEN: {{ $asorAccessToken | b64enc | quote }}
  {{- end }}
  {{- if $workdayTokenUrl }}
  WORKDAY_TOKEN_URL: {{ $workdayTokenUrl | b64enc | quote }}
  {{- end }}
{{- end }}
