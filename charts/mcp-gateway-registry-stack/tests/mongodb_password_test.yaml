suite: mongodb password resolution and upgrade safety
release:
  name: test
  namespace: default
tests:
  # ---------------------------------------------------------------------------
  # mongo-credentials secret (single source of truth for DOCUMENTDB_PASSWORD)
  # ---------------------------------------------------------------------------

  # NOTE on subchart values: the umbrella's YAML anchors propagate
  # mongodb.password / mongodb.connectionString into mongodb-configure at
  # parse time. Overriding `mongodb.*` at the test root only affects the
  # umbrella's view; the subchart's already-aliased values stay at the
  # default. So tests that exercise the subchart's secret template set
  # `mongodb-configure.mongodb.*` directly.

  - it: mongo-credentials.DOCUMENTDB_PASSWORD uses mongodb.password verbatim when set
    templates:
      - charts/mongodb-configure/templates/secret.yaml
    set:
      mongodb-configure:
        mongodb:
          password: "explicit-password-do-not-rotate"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: mongo-credentials
      - equal:
          path: data.DOCUMENTDB_PASSWORD
          # b64("explicit-password-do-not-rotate")
          value: ZXhwbGljaXQtcGFzc3dvcmQtZG8tbm90LXJvdGF0ZQ==

  - it: mongo-credentials auto-generates DOCUMENTDB_PASSWORD when password is empty (first install)
    templates:
      - charts/mongodb-configure/templates/secret.yaml
    set:
      mongodb-configure:
        mongodb:
          password: ""
    asserts:
      - matchRegex:
          path: data.DOCUMENTDB_PASSWORD
          # 64 random chars b64-encoded — bound loosely to avoid flakiness.
          # The point is we render *some* generated value, not "" (the
          # broken pre-fix path).
          pattern: "^[A-Za-z0-9+/=]{80,}$"

  - it: mongo-credentials omits DOCUMENTDB_PASSWORD entirely when connectionString is set
    templates:
      - charts/mongodb-configure/templates/secret.yaml
    set:
      mongodb-configure:
        mongodb:
          connectionString: "mongodb+srv://user:pw@cluster.example.com/db"
    asserts:
      - isKind:
          of: Secret
      - isNotEmpty:
          path: data.MONGODB_CONNECTION_STRING
      - notExists:
          path: data.DOCUMENTDB_PASSWORD
      - notExists:
          path: data.DOCUMENTDB_HOST
      - notExists:
          path: data.DOCUMENTDB_USERNAME

  - it: mongo-credentials is not rendered when existingMongoCredentialsSecret is set
    templates:
      - charts/mongodb-configure/templates/secret.yaml
    set:
      global:
        existingMongoCredentialsSecret: my-byo-mongo-creds
    asserts:
      - hasDocuments:
          count: 0

  # ---------------------------------------------------------------------------
  # MongoDBCommunity operator wiring
  # ---------------------------------------------------------------------------

  - it: operator points passwordSecretRef at mongo-credentials by default
    templates:
      - templates/mongodb-cluster.yaml
    set:
      mongodb:
        enabled: true
    asserts:
      - isKind:
          of: MongoDBCommunity
      - equal:
          path: spec.users[0].passwordSecretRef.name
          value: mongo-credentials
      - equal:
          path: spec.users[0].passwordSecretRef.key
          value: DOCUMENTDB_PASSWORD

  - it: operator passwordSecretRef honors existingPasswordSecret with legacy key
    templates:
      - templates/mongodb-cluster.yaml
    set:
      mongodb:
        enabled: true
        existingPasswordSecret: my-byo-pw-secret
    asserts:
      - equal:
          path: spec.users[0].passwordSecretRef.name
          value: my-byo-pw-secret
      - equal:
          path: spec.users[0].passwordSecretRef.key
          value: password

  - it: operator passwordSecretRef honors global.existingMongoCredentialsSecret
    templates:
      - templates/mongodb-cluster.yaml
    set:
      global:
        existingMongoCredentialsSecret: my-byo-mongo-creds
      mongodb:
        enabled: true
    asserts:
      - equal:
          path: spec.users[0].passwordSecretRef.name
          value: my-byo-mongo-creds
      - equal:
          path: spec.users[0].passwordSecretRef.key
          value: DOCUMENTDB_PASSWORD

  - it: operator is not rendered when connectionString is set
    templates:
      - templates/mongodb-cluster.yaml
    set:
      mongodb:
        enabled: true
        connectionString: "mongodb+srv://user:pw@cluster.example.com/db"
    asserts:
      - hasDocuments:
          count: 0

  - it: operator is not rendered when mongodb.enabled is false
    templates:
      - templates/mongodb-cluster.yaml
    set:
      mongodb:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
