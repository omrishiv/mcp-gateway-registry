{{- /*
First-class ServiceAccount for the registry pod. Created by default so roles
can be attached to a stable identity (e.g. OpenBao kubernetes-auth for the
egress vault binds its `registry` role to this SA; future RBAC/IRSA can attach
here too). Set serviceAccount.create=false to bring your own.
*/ -}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "registry.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
