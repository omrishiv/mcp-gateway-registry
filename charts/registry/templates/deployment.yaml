{{- /* Resolve image coordinates: per-service image.* overrides global.image.* when set */ -}}
{{- $imgRegistry := default .Values.global.image.registry .Values.image.registry }}
{{- $imgRepository := required "image.repository must be set" .Values.image.repository }}
{{- $imgTag := default .Values.global.image.tag .Values.image.tag }}
{{- $imgPullPolicy := default .Values.global.image.pullPolicy .Values.image.pullPolicy }}
{{- /* Fail-fast validation of user-supplied extraEnv */ -}}
{{- include "registry.validateExtraEnv" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
      app.kubernetes.io/component: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/component: {{ .Values.app.name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ $imgRegistry }}/{{ $imgRepository }}:{{ $imgTag }}"
          imagePullPolicy: {{ $imgPullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
            # The raw uvicorn app port (7860) is intentionally NOT declared here.
            # The app binds 127.0.0.1:7860 and is reached only over loopback by the
            # in-pod nginx; it is not a Service port and probes hit 8080 (nginx).
            # containerPort is informational, so advertising 7860 would only imply a
            # pod-reachable raw app port that does not exist. See service.yaml.
            - containerPort: 9464
              name: metrics
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: registry-otel-config
            - configMapRef:
                name: registry-app-log-config
            - configMapRef:
                name: registry-batch-config
            - secretRef:
                name: {{ .Values.app.existingSecret | default .Values.app.envSecretName }}
            {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
            - secretRef:
                name: keycloak-client-secret
            {{- end }}
            - secretRef:
                name: {{ .Values.global.existingMongoCredentialsSecret | default "mongo-credentials" }}
            {{- if .Values.global.sharedSecretName }}
            - secretRef:
                name: {{ .Values.global.existingSharedSecret | default .Values.global.sharedSecretName }}
            {{- end }}
            {{- if .Values.global.oauthProviderSecretName }}
            - secretRef:
                name: {{ .Values.global.existingOauthProviderSecret | default .Values.global.oauthProviderSecretName }}
            {{- end }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DEPLOYMENT_MODE
              value: {{ .Values.app.deploymentMode | default "with-gateway" | quote }}
            - name: REGISTRY_MODE
              value: {{ .Values.app.registryMode | default "full" | quote }}
            # Internal/workshop deployment classification (telemetry labels; issue #1216)
            - name: INTERNAL_ONLY_DEPLOYMENT
              value: {{ .Values.app.internalOnlyDeployment | default false | quote }}
            - name: INTERNAL_DEPLOYMENT_TYPE
              value: {{ .Values.app.internalDeploymentType | default "none" | quote }}
            - name: SHOW_SERVERS_TAB
              value: {{ .Values.app.showServersTab | default true | quote }}
            - name: SHOW_VIRTUAL_SERVERS_TAB
              value: {{ .Values.app.showVirtualServersTab | default true | quote }}
            - name: SHOW_SKILLS_TAB
              value: {{ .Values.app.showSkillsTab | default true | quote }}
            - name: SHOW_AGENTS_TAB
              value: {{ .Values.app.showAgentsTab | default true | quote }}
            - name: CODING_ASSISTANTS
              value: {{ .Values.app.codingAssistants | default "" | quote }}
            - name: UI_TITLE
              value: {{ .Values.app.uiTitle | default "" | quote }}
            # Tool-level access control (issue #1026)
            - name: MCP_TOOLS_LIST_FILTER_ENABLED
              value: {{ .Values.app.mcpToolsListFilterEnabled | toString | quote }}
            - name: TOOL_FILTER_AUDIT_LOG_LEVEL
              value: {{ .Values.app.toolFilterAuditLogLevel | default "INFO" | quote }}
            # DCR scope-allowlist alignment
            - name: MCP_ADVERTISED_SCOPES
              value: {{ .Values.app.mcpAdvertisedScopes | default "" | quote }}
            # IDE OAuth login (PR #1224): public client_id + fixed callback port
            - name: IDE_OAUTH_CLIENT_ID
              value: {{ .Values.app.ideOauthClientId | default "" | quote }}
            - name: IDE_OAUTH_CALLBACK_PORT
              value: {{ .Values.app.ideOauthCallbackPort | default 0 | toString | quote }}
            # Custom entity types (admin-defined, schema-driven catalog types)
            - name: CUSTOM_ENTITY_TYPES_ENABLED
              value: {{ .Values.app.customEntityTypesEnabled | default false | toString | quote }}
            - name: CUSTOM_TYPE_CACHE_TTL_SECONDS
              value: {{ .Values.app.customTypeCacheTtlSeconds | default 60 | toString | quote }}
            - name: MAX_CUSTOM_RECORDS_PER_TYPE
              value: {{ .Values.app.maxCustomRecordsPerType | default 1000 | toString | quote }}
            - name: MAX_CUSTOM_TYPES
              value: {{ .Values.app.maxCustomTypes | default 50 | toString | quote }}
            # Registry-UI internal token verification (the /api/ hop; minted by auth-server)
            - name: INTERNAL_TOKEN_TTL_SECONDS
              value: {{ .Values.app.internalTokenTtlSeconds | default 30 | toString | quote }}
            - name: INTERNAL_TOKEN_LEEWAY_SECONDS
              value: {{ .Values.app.internalTokenLeewaySeconds | default 5 | toString | quote }}
            {{- if .Values.awsRegistry.federationEnabled }}
            - name: AWS_REGISTRY_FEDERATION_ENABLED
              value: "true"
            {{- end }}
            {{- if eq (.Values.global.authProvider.type | default "keycloak") "keycloak" }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak
                  key: admin-password
            {{- end }}
            {{- if .Values.entra.clientSecretExistingSecret }}
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.entra.clientSecretExistingSecret }}
                  key: {{ .Values.entra.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.clientSecretExistingSecret }}
            - name: OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.clientSecretExistingSecret }}
                  key: {{ .Values.okta.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.m2mClientSecretExistingSecret }}
            - name: OKTA_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.m2mClientSecretExistingSecret }}
                  key: {{ .Values.okta.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.okta.apiTokenExistingSecret }}
            - name: OKTA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.okta.apiTokenExistingSecret }}
                  key: {{ .Values.okta.apiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.clientSecretExistingSecret }}
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.clientSecretExistingSecret }}
                  key: {{ .Values.auth0.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.m2mClientSecretExistingSecret }}
            - name: AUTH0_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.m2mClientSecretExistingSecret }}
                  key: {{ .Values.auth0.m2mClientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.auth0.managementApiTokenExistingSecret }}
            - name: AUTH0_MANAGEMENT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth0.managementApiTokenExistingSecret }}
                  key: {{ .Values.auth0.managementApiTokenExistingSecretKey }}
            {{- end }}
            {{- if .Values.pingfederate.clientSecretExistingSecret }}
            - name: PINGFEDERATE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pingfederate.clientSecretExistingSecret }}
                  key: {{ .Values.pingfederate.clientSecretExistingSecretKey }}
            {{- end }}
            {{- if .Values.pingfederate.m2mClientSecretExistingSecret }}
            - name: PINGFEDERATE_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pingfederate.m2mClientSecretExistingSecret }}
                  key: {{ .Values.pingfederate.m2mClientSecretExistingSecretKey }}
            {{- end }}
            # PingFederate Admin API (registry only). URL and USER are not secrets.
            # PASS comes from the chart-managed secret via envFrom unless
            # passwordExistingSecret is set, in which case we explicitly source it
            # from the external secret (mirrors PINGFEDERATE_CLIENT_SECRET pattern).
            - name: PF_ADMIN_URL
              value: {{ .Values.pingfederateAdmin.url | quote }}
            - name: PF_ADMIN_USER
              value: {{ .Values.pingfederateAdmin.user | quote }}
            {{- if .Values.pingfederateAdmin.passwordExistingSecret }}
            - name: PF_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pingfederateAdmin.passwordExistingSecret }}
                  key: {{ .Values.pingfederateAdmin.passwordExistingSecretKey }}
            {{- end }}
            {{- if eq (.Values.global.authProvider.type | default "keycloak") "pingfederate" }}
            - name: PINGFEDERATE_ENABLED
              value: "true"
            - name: PINGFEDERATE_BASE_URL
              value: {{ .Values.pingfederate.baseUrl | quote }}
            - name: PINGFEDERATE_EXTERNAL_URL
              value: {{ .Values.pingfederate.externalUrl | quote }}
            - name: PINGFEDERATE_CLIENT_ID
              value: {{ .Values.pingfederate.clientId | quote }}
            {{- if .Values.pingfederate.m2mClientId }}
            - name: PINGFEDERATE_M2M_CLIENT_ID
              value: {{ .Values.pingfederate.m2mClientId | quote }}
            {{- end }}
            {{- if .Values.pingfederate.applicationIdUri }}
            - name: PINGFEDERATE_APPLICATION_ID_URI
              value: {{ .Values.pingfederate.applicationIdUri | quote }}
            {{- end }}
            - name: PINGFEDERATE_GROUPS_CLAIM
              value: {{ .Values.pingfederate.groupsClaim | default "groups" | quote }}
            {{- end }}
            # Update-check: poll GitHub Releases for newer registry versions
            # (admin banner). Set updateCheck.enabled=false for air-gapped clusters.
            - name: UPDATE_CHECK_ENABLED
              value: {{ .Values.app.updateCheck.enabled | default true | toString | quote }}
            - name: UPDATE_CHECK_INTERVAL_HOURS
              value: {{ .Values.app.updateCheck.intervalHours | default 24 | toString | quote }}
            {{- if .Values.app.registryApiKeysExistingSecret }}
            - name: REGISTRY_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.registryApiKeysExistingSecret }}
                  key: {{ .Values.app.registryApiKeysExistingSecretKey }}
            {{- end }}
            {{- if .Values.ans.apiKeyExistingSecret }}
            - name: ANS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ans.apiKeyExistingSecret }}
                  key: {{ .Values.ans.apiKeyExistingSecretKey }}
            {{- end }}
            {{- if .Values.ans.apiSecretExistingSecret }}
            - name: ANS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ans.apiSecretExistingSecret }}
                  key: {{ .Values.ans.apiSecretExistingSecretKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
