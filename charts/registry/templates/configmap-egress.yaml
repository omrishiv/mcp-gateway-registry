{{- /*
Per-user egress credential vault (third-party OBO) — NON-secret config.

Rendered only when egressAuth.enabled. The single secret value
(AUTH_SERVER_NGINX_MARKER_SECRET) lives in the chart-managed env secret
(secret.yaml) / the stack shared-secret, NOT here. Wired into the registry
container via `envFrom: configMapRef` in deployment.yaml.

The registry needs the FULL set (it owns the secret store + OAuth engine).
*/ -}}
{{- if .Values.egressAuth.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-egress-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Values.app.name }}
    app.kubernetes.io/component: {{ .Values.app.name }}
data:
  EGRESS_AUTH_ENABLED: {{ .Values.egressAuth.enabled | toString | quote }}
  SECRET_STORE_BACKEND: {{ .Values.egressAuth.secretStoreBackend | default "dev-fernet" | quote }}
  EGRESS_OAUTH_CALLBACK_BASE_URL: {{ .Values.egressAuth.oauthCallbackBaseUrl | default "" | quote }}
  EGRESS_TOKEN_REFRESH_SKEW_SECONDS: {{ .Values.egressAuth.tokenRefreshSkewSeconds | default "300" | quote }}
  EGRESS_REFRESH_WORKER_INTERVAL_SECONDS: {{ .Values.egressAuth.refreshWorkerIntervalSeconds | default "300" | quote }}
  EGRESS_STATE_TTL_SECONDS: {{ .Values.egressAuth.stateTtlSeconds | default "600" | quote }}
  {{- if .Values.egressAuth.secretsDir }}
  EGRESS_SECRETS_DIR: {{ .Values.egressAuth.secretsDir | quote }}
  {{- end }}
  {{- if .Values.egressAuth.secretsManager }}
  {{- if .Values.egressAuth.secretsManager.kmsKeyId }}
  SECRETS_MANAGER_KMS_KEY_ID: {{ .Values.egressAuth.secretsManager.kmsKeyId | quote }}
  {{- end }}
  SECRETS_MANAGER_PATH_PREFIX: {{ .Values.egressAuth.secretsManager.pathPrefix | default "mcp/egress" | quote }}
  {{- end }}
  {{- if .Values.egressAuth.openbao }}
  # OPENBAO_ADDR: explicit addr wins; otherwise default to the release-scoped
  # OpenBao Service the stack deploys ("<release>-openbao.<ns>.svc"). Subcharts
  # share the parent release name, matching the stack's openbaoServiceHost
  # helper. If openbao.fullnameOverride is set at the stack level, set addr too.
  {{- if .Values.egressAuth.openbao.addr }}
  OPENBAO_ADDR: {{ .Values.egressAuth.openbao.addr | quote }}
  {{- else }}
  OPENBAO_ADDR: {{ printf "http://%s-openbao.%s.svc:8200" .Release.Name .Release.Namespace | quote }}
  {{- end }}
  {{- if .Values.egressAuth.openbao.namespace }}
  OPENBAO_NAMESPACE: {{ .Values.egressAuth.openbao.namespace | quote }}
  {{- end }}
  OPENBAO_KV_MOUNT: {{ .Values.egressAuth.openbao.kvMount | default "secret" | quote }}
  OPENBAO_AUTH_METHOD: {{ .Values.egressAuth.openbao.authMethod | default "token" | quote }}
  {{- if .Values.egressAuth.openbao.role }}
  OPENBAO_ROLE: {{ .Values.egressAuth.openbao.role | quote }}
  {{- end }}
  {{- end }}
{{- end }}