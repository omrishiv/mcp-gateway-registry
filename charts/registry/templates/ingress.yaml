{{- if .Values.ingress.enabled }}
{{- $routingMode := .Values.global.ingress.routingMode | default "subdomain" }}
{{- $domain := .Values.global.domain | default .Values.ingress.hostname }}
{{- $globalPaths := .Values.global.ingress.paths | default dict }}
{{- $pathPrefix := (get $globalPaths "registry") | default .Values.ingress.path | default "/registry" }}
{{- /*
In path routing mode the registry pod's in-cluster nginx reverse proxy
fronts auth-server and Keycloak for browser traffic (see
docker/nginx_rev_proxy_http_and_https.conf). The auth-server and
Keycloak ingresses are disabled by default, so the ALB must forward
their browser-facing paths to the registry Service — nginx handles the
final hop to the auth-server / Keycloak ClusterIP Services.

/.well-known must be forwarded too: spec-compliant MCP clients do RFC
9728 / RFC 8414 OAuth discovery at the ORIGIN ROOT
(https://<domain>/.well-known/oauth-protected-resource[/<server>],
.../oauth-authorization-server), NOT under the /registry path prefix.
The registry app serves these at root (its FastAPI mounts the
well-known router at "/.well-known" and the nginx catch-all forwards
it), but without this ingress rule the ALB never routes origin-root
/.well-known to the registry and discovery 404s — the client then
reports "the server does not advertise OAuth endpoints." The 401
WWW-Authenticate resource_metadata pointer (.../registry/.well-known/...)
still works, but strict clients use the origin-root form.

Subdomain mode does not need these extra rules: `/` on
mcpregistry.<domain> already catches every browser-facing path and
nginx does the internal routing.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    {{- if eq $routingMode "path" }}
    alb.ingress.kubernetes.io/group.name: mcp-gateway-stack
    alb.ingress.kubernetes.io/group.order: '20'
    {{- end }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | default .Values.global.ingress.scheme | default "internet-facing" }}
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/success-codes: 200,302
    {{- if .Values.global.ingress.inboundCidrs }}
    alb.ingress.kubernetes.io/inbound-cidrs: {{ .Values.global.ingress.inboundCidrs }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- if eq $routingMode "path" }}
    - host: {{ $domain | quote }}
      http:
        paths:
          - path: {{ $pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          # Origin-root OAuth discovery (RFC 9728 / RFC 8414). Strict MCP
          # clients probe https://<domain>/.well-known/... directly; route it
          # to the registry, whose nginx + FastAPI serve the discovery docs.
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /keycloak
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
    {{- else }}
    - host: {{ printf "mcpregistry.%s" $domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.app.name }}
                port:
                  name: http
    {{- end }}
{{- end }}
