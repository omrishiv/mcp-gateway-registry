suite: extraEnv and extraEnvFrom
templates:
  - deployment.yaml
release:
  name: test
  namespace: default
set:
  global:
    authProvider:
      type: keycloak
tests:
  - it: renders without extraEnv by default
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEPLOYMENT_MODE
            value: "with-gateway"
      # Internal/workshop deployment classification defaults (issue #1216)
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INTERNAL_ONLY_DEPLOYMENT
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INTERNAL_DEPLOYMENT_TYPE
            value: "none"

  - it: renders internal-deployment classification overrides (issue #1216)
    set:
      app:
        internalOnlyDeployment: true
        internalDeploymentType: workshop
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INTERNAL_ONLY_DEPLOYMENT
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: INTERNAL_DEPLOYMENT_TYPE
            value: "workshop"

  - it: appends extraEnv entries after chart-managed env vars
    set:
      extraEnv:
        - name: MY_FLAG
          value: "on"
        - name: MY_SECRET_VAR
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: my-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_FLAG
            value: "on"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_SECRET_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: my-key
      # Order: chart-managed env vars start with NODE_NAME (downward API,
      # env[0]); DEPLOYMENT_MODE is env[1]; REGISTRY_MODE is env[2]; the
      # internal-deployment classification pair (issue #1216)
      # INTERNAL_ONLY_DEPLOYMENT/INTERNAL_DEPLOYMENT_TYPE is env[3]/env[4];
      # CODING_ASSISTANTS is env[9]; UI_TITLE is env[10]; the tool-level access
      # control pair (issue #1026) is env[11]/env[12]; MCP_ADVERTISED_SCOPES is
      # env[13]; the IDE OAuth login pair (PR #1224) IDE_OAUTH_CLIENT_ID/
      # IDE_OAUTH_CALLBACK_PORT is env[14]/env[15]; the custom-entity-types
      # quartet (CUSTOM_ENTITY_TYPES_ENABLED, CUSTOM_TYPE_CACHE_TTL_SECONDS,
      # MAX_CUSTOM_RECORDS_PER_TYPE, MAX_CUSTOM_TYPES) is
      # env[16]/env[17]/env[18]/env[19]; the internal-token pair
      # (INTERNAL_TOKEN_TTL_SECONDS, INTERNAL_TOKEN_LEEWAY_SECONDS) is
      # env[20]/env[21];
      # KEYCLOAK_ADMIN_PASSWORD (conditional on keycloak provider) is env[22];
      # PF_ADMIN_URL/PF_ADMIN_USER (registry-only, always rendered) are
      # env[23]/env[24]; UPDATE_CHECK_ENABLED/UPDATE_CHECK_INTERVAL_HOURS
      # (always rendered) are env[25]/env[26]; user extraEnv entries are
      # appended at the end.
      #
      # NOTE: The indices below assume global.authProvider.type=keycloak
      # (set at the suite level), awsRegistry.federationEnabled=false, and
      # pingfederateAdmin.passwordExistingSecret=""  (so PF_ADMIN_PASS is
      # NOT explicitly emitted into env: — it comes via envFrom from the
      # chart-managed secret instead). Enabling federation, changing the
      # auth provider, or setting pingfederateAdmin.passwordExistingSecret
      # shifts these indices. If you add a new unconditional env block
      # before the extraEnv append, update the expected indices below.
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: NODE_NAME
      - equal:
          path: spec.template.spec.containers[0].env[1].name
          value: DEPLOYMENT_MODE
      - equal:
          path: spec.template.spec.containers[0].env[3].name
          value: INTERNAL_ONLY_DEPLOYMENT
      - equal:
          path: spec.template.spec.containers[0].env[4].name
          value: INTERNAL_DEPLOYMENT_TYPE
      - equal:
          path: spec.template.spec.containers[0].env[9].name
          value: CODING_ASSISTANTS
      - equal:
          path: spec.template.spec.containers[0].env[10].name
          value: UI_TITLE
      - equal:
          path: spec.template.spec.containers[0].env[11].name
          value: MCP_TOOLS_LIST_FILTER_ENABLED
      - equal:
          path: spec.template.spec.containers[0].env[12].name
          value: TOOL_FILTER_AUDIT_LOG_LEVEL
      - equal:
          path: spec.template.spec.containers[0].env[13].name
          value: MCP_ADVERTISED_SCOPES
      - equal:
          path: spec.template.spec.containers[0].env[14].name
          value: IDE_OAUTH_CLIENT_ID
      - equal:
          path: spec.template.spec.containers[0].env[15].name
          value: IDE_OAUTH_CALLBACK_PORT
      - equal:
          path: spec.template.spec.containers[0].env[16].name
          value: CUSTOM_ENTITY_TYPES_ENABLED
      - equal:
          path: spec.template.spec.containers[0].env[17].name
          value: CUSTOM_TYPE_CACHE_TTL_SECONDS
      - equal:
          path: spec.template.spec.containers[0].env[18].name
          value: MAX_CUSTOM_RECORDS_PER_TYPE
      - equal:
          path: spec.template.spec.containers[0].env[19].name
          value: MAX_CUSTOM_TYPES
      - equal:
          path: spec.template.spec.containers[0].env[20].name
          value: INTERNAL_TOKEN_TTL_SECONDS
      - equal:
          path: spec.template.spec.containers[0].env[21].name
          value: INTERNAL_TOKEN_LEEWAY_SECONDS
      - equal:
          path: spec.template.spec.containers[0].env[22].name
          value: KEYCLOAK_ADMIN_PASSWORD
      - equal:
          path: spec.template.spec.containers[0].env[23].name
          value: PF_ADMIN_URL
      - equal:
          path: spec.template.spec.containers[0].env[24].name
          value: PF_ADMIN_USER
      - equal:
          path: spec.template.spec.containers[0].env[25].name
          value: UPDATE_CHECK_ENABLED
      - equal:
          path: spec.template.spec.containers[0].env[26].name
          value: UPDATE_CHECK_INTERVAL_HOURS
      - equal:
          path: spec.template.spec.containers[0].env[27].name
          value: MY_FLAG
      - equal:
          path: spec.template.spec.containers[0].env[28].name
          value: MY_SECRET_VAR

  - it: appends extraEnvFrom entries after chart-managed envFrom sources
    set:
      extraEnvFrom:
        - secretRef:
            name: my-external-secrets
        - configMapRef:
            name: my-external-config
            optional: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-external-secrets
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-external-config
              optional: true
      # Order: chart-managed configmaps/secrets come first; user entries last.
      # NOTE: These indices assume the stack-level secrets (shared-secret,
      # oauth-provider-secret) are NOT set — those would append before the
      # extraEnvFrom entries. When running standalone (no parent stack),
      # envFrom[0..3] are otel-config, app-log-config, batch-config,
      # registry-secret.
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].configMapRef.name
          value: registry-otel-config
      - equal:
          path: spec.template.spec.containers[0].envFrom[1].configMapRef.name
          value: registry-app-log-config
      - equal:
          path: spec.template.spec.containers[0].envFrom[2].configMapRef.name
          value: registry-batch-config
      - equal:
          path: spec.template.spec.containers[0].envFrom[3].secretRef.name
          value: registry-secret

  - it: fails when extraEnv contains an env-block reserved name (DEPLOYMENT_MODE)
    set:
      extraEnv:
        - name: DEPLOYMENT_MODE
          value: "registry-only"
    asserts:
      - failedTemplate:
          errorPattern: "\"DEPLOYMENT_MODE\" is a reserved variable"

  - it: fails when extraEnv contains an env-block reserved name (SHOW_SKILLS_TAB)
    set:
      extraEnv:
        - name: SHOW_SKILLS_TAB
          value: "false"
    asserts:
      - failedTemplate:
          errorPattern: "\"SHOW_SKILLS_TAB\" is a reserved variable"

  - it: fails when extraEnv contains an env-block reserved name (INTERNAL_TOKEN_TTL_SECONDS)
    set:
      extraEnv:
        - name: INTERNAL_TOKEN_TTL_SECONDS
          value: "999"
    asserts:
      - failedTemplate:
          errorPattern: "\"INTERNAL_TOKEN_TTL_SECONDS\" is a reserved variable"

  - it: fails when extraEnv contains a reserved envFrom-sourced name (SECRET_KEY)
    set:
      extraEnv:
        - name: SECRET_KEY
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"SECRET_KEY\" is a reserved variable"

  - it: fails when extraEnv contains DOCUMENTDB_PASSWORD
    set:
      extraEnv:
        - name: DOCUMENTDB_PASSWORD
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"DOCUMENTDB_PASSWORD\" is a reserved variable"

  - it: fails when extraEnv contains a reserved egress name (EGRESS_AUTH_ENABLED)
    set:
      extraEnv:
        - name: EGRESS_AUTH_ENABLED
          value: "true"
    asserts:
      - failedTemplate:
          errorPattern: "\"EGRESS_AUTH_ENABLED\" is a reserved variable"

  - it: fails when extraEnv contains the egress marker secret name
    set:
      extraEnv:
        - name: AUTH_SERVER_NGINX_MARKER_SECRET
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"AUTH_SERVER_NGINX_MARKER_SECRET\" is a reserved variable"

  - it: fails when extraEnv contains REGISTRY_API_KEYS
    set:
      extraEnv:
        - name: REGISTRY_API_KEYS
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"REGISTRY_API_KEYS\" is a reserved variable"

  - it: fails when extraEnv contains M2M_DIRECT_REGISTRATION_ENABLED
    set:
      extraEnv:
        - name: M2M_DIRECT_REGISTRATION_ENABLED
          value: "false"
    asserts:
      - failedTemplate:
          errorPattern: "\"M2M_DIRECT_REGISTRATION_ENABLED\" is a reserved variable"

  - it: fails when extraEnv contains REGISTRATION_GATE_OAUTH2_CLIENT_SECRET
    set:
      extraEnv:
        - name: REGISTRATION_GATE_OAUTH2_CLIENT_SECRET
          value: "oops"
    asserts:
      - failedTemplate:
          errorPattern: "\"REGISTRATION_GATE_OAUTH2_CLIENT_SECRET\" is a reserved variable"

  - it: fails when extraEnv contains a batch configmap name (BATCH_WORKER_ENABLED)
    set:
      extraEnv:
        - name: BATCH_WORKER_ENABLED
          value: "false"
    asserts:
      - failedTemplate:
          errorPattern: "\"BATCH_WORKER_ENABLED\" is a reserved variable"

  - it: fails when extraEnv contains UI_TITLE
    set:
      extraEnv:
        - name: UI_TITLE
          value: "Acme"
    asserts:
      - failedTemplate:
          errorPattern: "\"UI_TITLE\" is a reserved variable"

  - it: emits empty UI_TITLE by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: UI_TITLE
            value: ""

  - it: emits UI_TITLE override when app.uiTitle is set
    set:
      app:
        uiTitle: "Acme AI Portal"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: UI_TITLE
            value: "Acme AI Portal"

  - it: emits custom-entity-types flags with defaults (feature off)
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_ENTITY_TYPES_ENABLED
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_TYPE_CACHE_TTL_SECONDS
            value: "60"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CUSTOM_RECORDS_PER_TYPE
            value: "1000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CUSTOM_TYPES
            value: "50"

  - it: emits custom-entity-types overrides when app values are set
    set:
      app:
        customEntityTypesEnabled: true
        customTypeCacheTtlSeconds: 120
        maxCustomRecordsPerType: 500
        maxCustomTypes: 25
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_ENTITY_TYPES_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_TYPE_CACHE_TTL_SECONDS
            value: "120"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CUSTOM_RECORDS_PER_TYPE
            value: "500"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MAX_CUSTOM_TYPES
            value: "25"

  - it: fails when extraEnv contains CUSTOM_ENTITY_TYPES_ENABLED
    set:
      extraEnv:
        - name: CUSTOM_ENTITY_TYPES_ENABLED
          value: "true"
    asserts:
      - failedTemplate:
          errorPattern: "\"CUSTOM_ENTITY_TYPES_ENABLED\" is a reserved variable"

  - it: emits Keycloak-DCR-aligned MCP_ADVERTISED_SCOPES by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ADVERTISED_SCOPES
            value: "profile email offline_access"

  - it: lets app.mcpAdvertisedScopes be overridden (custom scope list)
    set:
      app:
        mcpAdvertisedScopes: "openid"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ADVERTISED_SCOPES
            value: "openid"

  - it: lets app.mcpAdvertisedScopes be cleared to empty (registry derives the list)
    set:
      app:
        mcpAdvertisedScopes: ""
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ADVERTISED_SCOPES
            value: ""

  - it: fails when extraEnv contains MCP_ADVERTISED_SCOPES
    set:
      extraEnv:
        - name: MCP_ADVERTISED_SCOPES
          value: "openid"
    asserts:
      - failedTemplate:
          errorPattern: "\"MCP_ADVERTISED_SCOPES\" is a reserved variable"

  - it: fails on duplicate names within extraEnv
    set:
      extraEnv:
        - name: MY_VAR
          value: "a"
        - name: MY_VAR
          value: "b"
    asserts:
      - failedTemplate:
          errorPattern: "duplicate name \"MY_VAR\""

  - it: fails when an extraEnv entry is missing the name field
    set:
      extraEnv:
        - value: "just-a-value"
    asserts:
      - failedTemplate:
          errorPattern: "missing required 'name' field"
