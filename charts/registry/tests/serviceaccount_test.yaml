suite: registry service account
templates:
  - templates/serviceaccount.yaml
  - templates/deployment.yaml
tests:
  - it: creates a ServiceAccount named after the app by default
    template: templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: registry

  - it: honors an explicit serviceAccount.name
    template: templates/serviceaccount.yaml
    set:
      serviceAccount:
        name: my-registry-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-registry-sa

  - it: is not created when serviceAccount.create is false
    template: templates/serviceaccount.yaml
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: the deployment runs as the chart ServiceAccount
    template: templates/deployment.yaml
    set:
      app:
        secretKey: test-key-32-bytes-aaaaaaaaaaaaaaaaaa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: registry
