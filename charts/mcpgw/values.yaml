# Global configuration
global:
  image:
    # Container registry (host + optional namespace). Shared default across subcharts.
    registry: public.ecr.aws/p3v1o3c6
    tag: 1.23.0
    pullPolicy: IfNotPresent

# Per-service image configuration
# Any field left empty falls back to the corresponding global.image.* value.
image:
  registry: ""      # Overrides global.image.registry when set
  repository: mcpgw  # Image name within the registry
  tag: ""           # Overrides global.image.tag when set
  pullPolicy: ""    # Overrides global.image.pullPolicy when set

# Application configuration
app:
  name: mcpgw-server
  # Number of replicas. The server always runs in stateless MCP transport
  # mode (hardcoded in server.py) so multi-replica is safe under round-robin
  # load balancing without any further configuration. OIDC is not currently
  # wired through the chart; see issue #895.
  replicas: 1
  envSecretName: mcpgw-secret
  existingSecret: ""  # If set, use this existing secret instead of creating one
  port: 8000
  # Server bind address. Default "0.0.0.0" works on all Kubernetes nodes.
  # Set to "::" only for IPv6-only clusters (requires net.ipv6.bindv6only=0
  # on the node). See docs/unified-parameter-reference.md Group 4.
  bindHost: "0.0.0.0"

  # Registry connection — default is the standalone fallback. When this
  # subchart is deployed as part of mcp-gateway-registry-stack, the
  # template overrides this with the full ClusterIP DNS and the
  # registry Service's correct port (8000, see charts/registry/values.yaml).
  registryUrl: http://registry:8000

  # Security settings
  # secretKey: Required for standalone deployment (not needed when deployed via stack).
  # When deployed via mcp-gateway-registry-stack, SECRET_KEY comes from the shared secret.
  # Uncomment to use a specific key:
  # secretKey: "your-secure-key-here"

  # GitHub private repo auth (SKILL.md fetching)
  githubPat: ""
  githubPatExistingSecret: ""  # If set, read GITHUB_PAT from this K8s secret
  githubPatExistingSecretKey: "GITHUB_PAT"
  githubAppId: ""
  githubAppInstallationId: ""
  githubAppPrivateKey: ""
  githubAppPrivateKeyExistingSecret: ""  # If set, read GITHUB_APP_PRIVATE_KEY from this K8s secret
  githubAppPrivateKeyExistingSecretKey: "GITHUB_APP_PRIVATE_KEY"
  githubExtraHosts: ""
  githubApiBaseUrl: "https://api.github.com"

# Service configuration
service:
  type: ClusterIP
  port: 8003
  annotations: {}
  # Session affinity. Not needed for multi-replica — the server runs in
  # stateless MCP mode, so any replica can handle any request. Leave as
  # "None" unless you have a specific reason (e.g. debugging per-replica
  # behavior) to pin clients to a single pod.
  sessionAffinity: None

# PodDisruptionBudget. Only rendered when replicas > 1; protects against
# voluntary disruptions (node drains, rolling deploys) taking the whole
# gateway down.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Resource limits and requests
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

# mcpgw does NOT expose a public ingress. External MCP clients reach
# its tools via the registry's nginx reverse proxy, which dynamically
# generates a `location /airegistry-tools/` block from the registered
# server record seeded at registry startup
# (see registry/services/demo_servers_init.py and
# cli/examples/airegistry.json). Traffic flow:
#   client → registry ingress → registry pod nginx
#          → location /airegistry-tools/ { proxy_pass http://mcpgw-server:8003/; }
#          → mcpgw pod
# The Service defined in templates/service.yaml is the only external
# surface mcpgw needs — it's what the registry nginx resolves to.

# Extra environment variables appended to the container's `env:` list.
# Uses the native Kubernetes EnvVar schema, so `valueFrom` is supported.
#
# Validation (template render fails if violated):
#   - Names must be unique within this list.
#   - Names must not collide with chart-managed variables; use the
#     corresponding values.yaml field instead (e.g. set app.githubAppId
#     rather than GITHUB_APP_ID here). See the reserved list in
#     templates/_helpers.tpl.
#
# User entries are appended last, so they win over chart `envFrom:`
# sources on name collision — which is why the reserved list guards
# catastrophic envFrom-sourced keys like SECRET_KEY.
#
# Example:
# extraEnv:
#   - name: MY_FEATURE_FLAG
#     value: "true"
#   - name: MY_SECRET_VAR
#     valueFrom:
#       secretKeyRef:
#         name: my-secret
#         key: my-key
extraEnv: []

# Extra `envFrom:` sources appended to the container. Use this to inject
# all keys from an external ConfigMap or Secret you manage (e.g. via
# External Secrets Operator, SealedSecrets, or Vault CSI).
#
# NOT validated at template time — Helm cannot introspect external
# ConfigMap/Secret contents. Consequences:
#   - Keys in your source will SILENTLY OVERRIDE chart-managed envFrom
#     entries (within envFrom, last source wins). Do NOT include keys
#     like SECRET_KEY, PORT, REGISTRY_BASE_URL, or any FEDERATION_* key
#     — shadowing them breaks service wiring with no error.
#   - Chart-managed `env:` entries (e.g. HOST) always win over anything
#     in extraEnvFrom — K8s rules: explicit env: beats envFrom regardless
#     of order.
#   - Referenced resources must exist when the pod starts (the default
#     is optional: false). Set `optional: true` if the resource may be
#     absent.
#
# Example:
# extraEnvFrom:
#   - secretRef:
#       name: my-external-secrets
#   - configMapRef:
#       name: my-external-config
#       optional: true
extraEnvFrom: []

nodeSelector: {}
