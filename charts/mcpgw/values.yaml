# Global configuration
global:
  image:
    # Container registry (host + optional namespace). Shared default across subcharts.
    registry: public.ecr.aws/p3v1o3c6
    tag: 1.0.21
    pullPolicy: IfNotPresent

# Per-service image configuration
# Any field left empty falls back to the corresponding global.image.* value.
image:
  registry: ""      # Overrides global.image.registry when set
  repository: mcpgw  # Image name within the registry
  tag: ""           # Overrides global.image.tag when set
  pullPolicy: ""    # Overrides global.image.pullPolicy when set

# Application configuration
app:
  name: mcpgw-server
  replicas: 1
  envSecretName: mcpgw-secret
  existingSecret: ""  # If set, use this existing secret instead of creating one
  port: 8000

  # Registry connection
  registryUrl: http://registry:8080

  # Security settings
  # secretKey: Required for standalone deployment (not needed when deployed via stack).
  # When deployed via mcp-gateway-registry-stack, SECRET_KEY comes from the shared secret.
  # Uncomment to use a specific key:
  # secretKey: "your-secure-key-here"

  # Embeddings configuration
  embeddingsProvider: sentence-transformers
  embeddingsModelName: all-MiniLM-L6-v2
  embeddingsModelDimensions: "384"
  embeddingsApiKey: ""
  embeddingsApiKeyExistingSecret: ""  # If set, read EMBEDDINGS_API_KEY from this K8s secret instead of embeddingsApiKey
  embeddingsApiKeyExistingSecretKey: "EMBEDDINGS_API_KEY"  # Key within the existing secret
  embeddingsApiBase: ""
  embeddingsAwsRegion: us-east-1

  # GitHub private repo auth (SKILL.md fetching)
  githubPat: ""
  githubPatExistingSecret: ""  # If set, read GITHUB_PAT from this K8s secret
  githubPatExistingSecretKey: "GITHUB_PAT"
  githubAppId: ""
  githubAppInstallationId: ""
  githubAppPrivateKey: ""
  githubAppPrivateKeyExistingSecret: ""  # If set, read GITHUB_APP_PRIVATE_KEY from this K8s secret
  githubAppPrivateKeyExistingSecretKey: "GITHUB_APP_PRIVATE_KEY"
  githubExtraHosts: ""
  githubApiBaseUrl: "https://api.github.com"

# Service configuration
service:
  type: ClusterIP
  port: 8003
  annotations: {}

# Resource limits and requests
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1
    memory: 2Gi

# Ingress configuration
ingress:
  enabled: false
  className: alb
  hostname: ""
  annotations: {}
  tls: false
  # Routing mode: "subdomain" or "path"
  # - subdomain: mcpgw.domain.com
  # - path: domain.com/mcpgw
  routingMode: subdomain
  # Path prefix when using path-based routing (default: /mcpgw)
  path: /mcpgw

nodeSelector: {}
