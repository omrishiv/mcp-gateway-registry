version: '3.8'

# DocumentDB Initialization:
# For AWS DocumentDB Elastic Cluster setup, run the initialization script:
#   export DOCUMENTDB_HOST=your-cluster.docdb.amazonaws.com
#   export DOCUMENTDB_USERNAME=admin
#   export DOCUMENTDB_PASSWORD=yourpassword
#   ./scripts/init-documentdb.sh
#
# Then set STORAGE_BACKEND=documentdb in your environment and restart services.
# Note: DocumentDB is a managed AWS service and runs outside of Docker.

services:
  # MongoDB Community Edition 8.2 (alternative to DocumentDB for local development)
  # Vector search is implemented in application code (see search_repository.py)
  # Running without authentication for local development simplicity
  mongodb:
    image: mongo:8.2
    container_name: mcp-mongodb
    command: mongod --replSet rs0 --bind_ip 127.0.0.1,mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID   # Required by gosu to switch to mongodb user at startup
      - SETGID   # Required by gosu to switch to mongodb group at startup
      - CHOWN    # Required by entrypoint to fix /data/db ownership
      - DAC_OVERRIDE  # Required by entrypoint to read /data/db before chown
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # MongoDB initialization (creates replica set, indexes, and loads admin scope)
  mongodb-init:
    image: python:3.14-slim
    container_name: mcp-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - DOCUMENTDB_HOST=mongodb
      - DOCUMENTDB_PORT=27017
      - DOCUMENTDB_DATABASE=${DOCUMENTDB_DATABASE:-mcp_registry}
      - DOCUMENTDB_USERNAME=${DOCUMENTDB_USERNAME:-}
      - DOCUMENTDB_PASSWORD=${DOCUMENTDB_PASSWORD:-}
      - DOCUMENTDB_NAMESPACE=${DOCUMENTDB_NAMESPACE:-default}
      - ENTRA_GROUP_ADMIN_ID=${ENTRA_GROUP_ADMIN_ID:-}
    volumes:
      - ./scripts/init-mongodb-ce.py:/app/scripts/init-mongodb-ce.py:ro
      - ./scripts/registry-admins.json:/app/scripts/registry-admins.json:ro
      - ./scripts/mcp-registry-admin.json:/app/scripts/mcp-registry-admin.json:ro
      - ./scripts/mcp-servers-unrestricted-read.json:/app/scripts/mcp-servers-unrestricted-read.json:ro
      - ./scripts/mcp-servers-unrestricted-execute.json:/app/scripts/mcp-servers-unrestricted-execute.json:ro
    command: >
      sh -c "
      pip install --quiet motor pymongo &&
      python /app/scripts/init-mongodb-ce.py
      "
    restart: "no"

  # Registry service (includes nginx, SSL, FAISS, models)
  registry:
    build:
      context: .
      dockerfile: docker/Dockerfile.registry
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      # Deployment Mode Configuration
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-with-gateway}
      - REGISTRY_MODE=${REGISTRY_MODE:-full}
      # Internal/workshop deployment classification (telemetry labels; issue #1216)
      - INTERNAL_ONLY_DEPLOYMENT=${INTERNAL_ONLY_DEPLOYMENT:-false}
      - INTERNAL_DEPLOYMENT_TYPE=${INTERNAL_DEPLOYMENT_TYPE:-none}
      # Tab visibility overrides (AND-ed with REGISTRY_MODE)
      - SHOW_SERVERS_TAB=${SHOW_SERVERS_TAB:-true}
      - SHOW_VIRTUAL_SERVERS_TAB=${SHOW_VIRTUAL_SERVERS_TAB:-true}
      - SHOW_SKILLS_TAB=${SHOW_SKILLS_TAB:-true}
      - SHOW_AGENTS_TAB=${SHOW_AGENTS_TAB:-true}
      # Coding assistants allowlist (comma-separated: cursor,roo-code,claude-code,kiro). Empty = show all.
      - CODING_ASSISTANTS=${CODING_ASSISTANTS:-}
      # UI title override. Empty = deployment-mode-aware default.
      - UI_TITLE=${UI_TITLE:-}
      - GATEWAY_ADDITIONAL_SERVER_NAMES=${GATEWAY_ADDITIONAL_SERVER_NAMES:-}
      # Registry Card Configuration
      - REGISTRY_URL=${REGISTRY_URL:-http://localhost}
      - REGISTRY_NAME=${REGISTRY_NAME:-AI Registry}
      - REGISTRY_ORGANIZATION_NAME=${REGISTRY_ORGANIZATION_NAME:-ACME Inc.}
      - REGISTRY_DESCRIPTION=${REGISTRY_DESCRIPTION:-}
      - REGISTRY_CONTACT_EMAIL=${REGISTRY_CONTACT_EMAIL:-}
      - REGISTRY_CONTACT_URL=${REGISTRY_CONTACT_URL:-}
      # MCP OAuth discovery (RFC 9728 / RFC 8414)
      - MCP_HTTPS_REQUIRED=${MCP_HTTPS_REQUIRED:-true}
      - MCP_RESOURCE_DOCUMENTATION_URL=${MCP_RESOURCE_DOCUMENTATION_URL:-}
      - MCP_ADVERTISED_SCOPES=${MCP_ADVERTISED_SCOPES:-}
      - SECRET_KEY=${SECRET_KEY}
      # Per-user egress credential vault (off by default)
      - EGRESS_AUTH_ENABLED=${EGRESS_AUTH_ENABLED:-false}
      - SECRET_STORE_BACKEND=${SECRET_STORE_BACKEND:-dev-fernet}
      - EGRESS_OAUTH_CALLBACK_BASE_URL=${EGRESS_OAUTH_CALLBACK_BASE_URL:-}
      - EGRESS_TOKEN_REFRESH_SKEW_SECONDS=${EGRESS_TOKEN_REFRESH_SKEW_SECONDS:-300}
      - EGRESS_STATE_TTL_SECONDS=${EGRESS_STATE_TTL_SECONDS:-600}
      - AUTH_SERVER_NGINX_MARKER_SECRET=${AUTH_SERVER_NGINX_MARKER_SECRET:-}
      - AWS_SECRETS_REGION=${AWS_SECRETS_REGION:-}
      - SECRETS_MANAGER_KMS_KEY_ID=${SECRETS_MANAGER_KMS_KEY_ID:-}
      - SECRETS_MANAGER_PATH_PREFIX=${SECRETS_MANAGER_PATH_PREFIX:-mcp/egress}
      - OPENBAO_ADDR=${OPENBAO_ADDR:-}
      - OPENBAO_NAMESPACE=${OPENBAO_NAMESPACE:-}
      - OPENBAO_KV_MOUNT=${OPENBAO_KV_MOUNT:-secret}
      - OPENBAO_AUTH_METHOD=${OPENBAO_AUTH_METHOD:-token}
      - OPENBAO_ROLE=${OPENBAO_ROLE:-}
      - AUTH_SERVER_URL=${AUTH_SERVER_URL}
      - AUTH_SERVER_EXTERNAL_URL=${AUTH_SERVER_EXTERNAL_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_ENABLED=${GITHUB_ENABLED:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_ENABLED=${GOOGLE_ENABLED:-false}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_ENABLED=${COGNITO_ENABLED:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - HEALTH_CHECK_INTERVAL_SECONDS=${HEALTH_CHECK_INTERVAL_SECONDS:-30}
      - SRE_GATEWAY_AUTH_TOKEN=${SRE_GATEWAY_AUTH_TOKEN}
      - ATLASSIAN_AUTH_TOKEN=${ATLASSIAN_AUTH_TOKEN}
      # Metrics configuration
      - METRICS_SERVICE_URL=http://metrics-service:8890
      - METRICS_API_KEY=${METRICS_API_KEY_REGISTRY}
      - METRICS_API_KEY_NGINX=${METRICS_API_KEY_REGISTRY}
      # OTel-native metrics emission (issue #1122)
      # METRICS_LEGACY_HTTP_POST=true ALSO posts to metrics-service (one-release transition).
      # Default false: native OTel emission only; metrics-service does not receive POSTs.
      - METRICS_LEGACY_HTTP_POST=${METRICS_LEGACY_HTTP_POST:-false}
      - OTEL_METRIC_EXPORT_INTERVAL_MS=${OTEL_METRIC_EXPORT_INTERVAL_MS:-15000}
      # Bind the OTel exporter-prometheus listener so the in-cluster Prometheus
      # can scrape the registry directly. Compose binds to 127.0.0.1 by default
      # (Prometheus reaches it via service DNS; not exposed to other networks).
      - OTEL_EXPORTER_PROMETHEUS_HOST=${OTEL_EXPORTER_PROMETHEUS_HOST:-0.0.0.0}
      - OTEL_EXPORTER_PROMETHEUS_PORT=${OTEL_EXPORTER_PROMETHEUS_PORT:-9464}
      # Standard OTel SDK env vars. Setting OTEL_EXPORTER_OTLP_ENDPOINT activates
      # the OTLP push exporter (and triggers the entrypoint to wrap uvicorn with
      # opentelemetry-instrument). Default empty: pull-only via :9464.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=mcp-gateway-registry
      # Keycloak configuration
      - AUTH_PROVIDER=${AUTH_PROVIDER:-cognito}
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-false}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_EXTERNAL_URL=${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-mcp-gateway}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-mcp-gateway-web}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_M2M_CLIENT_ID=${KEYCLOAK_M2M_CLIENT_ID}
      - KEYCLOAK_M2M_CLIENT_SECRET=${KEYCLOAK_M2M_CLIENT_SECRET}
      # IDE OAuth login public client_id (PR #1224). Public, not a secret.
      - IDE_OAUTH_CLIENT_ID=${IDE_OAUTH_CLIENT_ID:-}
      # Fixed OAuth callback port for IdPs that match redirect_uri literally
      # (Okta/Entra/Cognito). 0/unset = let the IDE pick (Keycloak/DCR).
      - IDE_OAUTH_CALLBACK_PORT=${IDE_OAUTH_CALLBACK_PORT:-0}
      # Entra ID configuration
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET}
      - ENTRA_ENABLED=${ENTRA_ENABLED:-false}
      - ENTRA_APPLICATION_ID_URI=${ENTRA_APPLICATION_ID_URI:-}
      # IdP group filtering (applies to all identity providers)
      - IDP_GROUP_FILTER_PREFIX=${IDP_GROUP_FILTER_PREFIX:-}
      # Login-time IdP group allowlist (blank = auto-derive from scope mappings)
      - ALLOWED_IDP_GROUPS=${ALLOWED_IDP_GROUPS:-}
      # IdP user-to-group fallback (issue #1127)
      - IDP_USER_GROUP_FALLBACK_ENABLED_PROVIDERS=${IDP_USER_GROUP_FALLBACK_ENABLED_PROVIDERS:-pingfederate}
      # Okta configuration
      - OKTA_DOMAIN=${OKTA_DOMAIN:-}
      - OKTA_CLIENT_ID=${OKTA_CLIENT_ID:-}
      - OKTA_CLIENT_SECRET=${OKTA_CLIENT_SECRET:-}
      - OKTA_M2M_CLIENT_ID=${OKTA_M2M_CLIENT_ID:-}
      - OKTA_M2M_CLIENT_SECRET=${OKTA_M2M_CLIENT_SECRET:-}
      - OKTA_API_TOKEN=${OKTA_API_TOKEN:-}
      - OKTA_AUTH_SERVER_ID=${OKTA_AUTH_SERVER_ID:-}
      # Auth0 configuration
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_GROUPS_CLAIM=${AUTH0_GROUPS_CLAIM:-https://mcp-gateway/groups}
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - AUTH0_M2M_CLIENT_ID=${AUTH0_M2M_CLIENT_ID:-}
      - AUTH0_M2M_CLIENT_SECRET=${AUTH0_M2M_CLIENT_SECRET:-}
      # PingFederate configuration
      - PINGFEDERATE_BASE_URL=${PINGFEDERATE_BASE_URL:-}
      - PINGFEDERATE_EXTERNAL_URL=${PINGFEDERATE_EXTERNAL_URL:-}
      - PINGFEDERATE_CLIENT_ID=${PINGFEDERATE_CLIENT_ID:-}
      - PINGFEDERATE_CLIENT_SECRET=${PINGFEDERATE_CLIENT_SECRET:-}
      - PINGFEDERATE_M2M_CLIENT_ID=${PINGFEDERATE_M2M_CLIENT_ID:-}
      - PINGFEDERATE_M2M_CLIENT_SECRET=${PINGFEDERATE_M2M_CLIENT_SECRET:-}
      - PINGFEDERATE_APPLICATION_ID_URI=${PINGFEDERATE_APPLICATION_ID_URI:-}
      - PINGFEDERATE_GROUPS_CLAIM=${PINGFEDERATE_GROUPS_CLAIM:-groups}
      - PINGFEDERATE_ENABLED=${PINGFEDERATE_ENABLED:-false}
      # PingFederate Admin API (registry only)
      - PF_ADMIN_URL=${PF_ADMIN_URL:-https://pingfederate:9999}
      - PF_ADMIN_USER=${PF_ADMIN_USER:-administrator}
      - PF_ADMIN_PASS=${PF_ADMIN_PASS:-2FederateM0re}
      # External Registry Configuration
      - EXTERNAL_REGISTRY_TAGS=${EXTERNAL_REGISTRY_TAGS:-anthropic-registry,workday-asor}
      - ASOR_ACCESS_TOKEN=${ASOR_ACCESS_TOKEN}
      - ASOR_CLIENT_CREDENTIALS=${ASOR_CLIENT_CREDENTIALS}
      # Security Scanning Configuration
      - SECURITY_SCAN_ENABLED=${SECURITY_SCAN_ENABLED:-true}
      - SECURITY_SCAN_ON_REGISTRATION=${SECURITY_SCAN_ON_REGISTRATION:-true}
      - SECURITY_BLOCK_UNSAFE_SERVERS=${SECURITY_BLOCK_UNSAFE_SERVERS:-true}
      - SECURITY_ANALYZERS=${SECURITY_ANALYZERS:-yara}
      - SECURITY_SCAN_TIMEOUT=${SECURITY_SCAN_TIMEOUT:-60}
      - SECURITY_ADD_PENDING_TAG=${SECURITY_ADD_PENDING_TAG:-true}
      - MCP_SCANNER_LLM_API_KEY=${MCP_SCANNER_LLM_API_KEY}
      # GitHub Private Repository Access (SKILL.md fetching)
      - GITHUB_PAT=${GITHUB_PAT:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:-}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY:-}
      - GITHUB_EXTRA_HOSTS=${GITHUB_EXTRA_HOSTS:-}
      - GITHUB_API_BASE_URL=${GITHUB_API_BASE_URL:-https://api.github.com}
      # Storage Backend Configuration
      - STORAGE_BACKEND=${STORAGE_BACKEND:-file}
      # DocumentDB/MongoDB Configuration (when STORAGE_BACKEND=documentdb)
      # MONGODB_CONNECTION_STRING: Optional full URI override (e.g. for MongoDB
      # Atlas, mongodb+srv://...). When set, takes precedence over the discrete
      # DOCUMENTDB_* values below.
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING:-}
      - DOCUMENTDB_HOST=${DOCUMENTDB_HOST:-mongodb}
      - DOCUMENTDB_PORT=${DOCUMENTDB_PORT:-27017}
      - DOCUMENTDB_USERNAME=${DOCUMENTDB_USERNAME}
      - DOCUMENTDB_PASSWORD=${DOCUMENTDB_PASSWORD}
      - DOCUMENTDB_DATABASE=${DOCUMENTDB_DATABASE:-mcp_registry}
      - DOCUMENTDB_NAMESPACE=${DOCUMENTDB_NAMESPACE:-default}
      - DOCUMENTDB_USE_TLS=${DOCUMENTDB_USE_TLS:-false}
      - DOCUMENTDB_TLS_CA_FILE=${DOCUMENTDB_TLS_CA_FILE:-}
      - DOCUMENTDB_USE_IAM=${DOCUMENTDB_USE_IAM:-false}
      - DOCUMENTDB_REPLICA_SET=${DOCUMENTDB_REPLICA_SET:-rs0}
      - DOCUMENTDB_READ_PREFERENCE=${DOCUMENTDB_READ_PREFERENCE:-secondaryPreferred}
      # Embeddings Configuration
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-sentence-transformers}
      - EMBEDDINGS_MODEL_NAME=${EMBEDDINGS_MODEL_NAME:-all-MiniLM-L6-v2}
      - EMBEDDINGS_MODEL_DIMENSIONS=${EMBEDDINGS_MODEL_DIMENSIONS:-384}
      - EMBEDDINGS_API_KEY=${EMBEDDINGS_API_KEY}
      - EMBEDDINGS_API_BASE=${EMBEDDINGS_API_BASE}
      - EMBEDDINGS_AWS_REGION=${EMBEDDINGS_AWS_REGION:-us-east-1}
      # ANS (Agent Name Service) Configuration
      - ANS_INTEGRATION_ENABLED=${ANS_INTEGRATION_ENABLED:-false}
      - ANS_API_ENDPOINT=${ANS_API_ENDPOINT:-https://api.godaddy.com}
      - ANS_API_KEY=${ANS_API_KEY:-}
      - ANS_API_SECRET=${ANS_API_SECRET:-}
      - ANS_API_TIMEOUT_SECONDS=${ANS_API_TIMEOUT_SECONDS:-30}
      - ANS_SYNC_INTERVAL_HOURS=${ANS_SYNC_INTERVAL_HOURS:-6}
      - ANS_VERIFICATION_CACHE_TTL_SECONDS=${ANS_VERIFICATION_CACHE_TTL_SECONDS:-3600}
      # Federation Peer Sync Configuration
      - FEDERATION_TOKEN_ENDPOINT=${FEDERATION_TOKEN_ENDPOINT}
      - FEDERATION_CLIENT_ID=${FEDERATION_CLIENT_ID}
      - FEDERATION_CLIENT_SECRET=${FEDERATION_CLIENT_SECRET}
      # Federation Token Encryption (for encrypting federation_token before storage)
      - FEDERATION_ENCRYPTION_KEY=${FEDERATION_ENCRYPTION_KEY:-}
      # Federation static token auth
      - FEDERATION_STATIC_TOKEN_AUTH_ENABLED=${FEDERATION_STATIC_TOKEN_AUTH_ENABLED:-false}
      - FEDERATION_STATIC_TOKEN=${FEDERATION_STATIC_TOKEN:-}
      # Auth server config (mirrored for config panel visibility)
      - REGISTRY_STATIC_TOKEN_AUTH_ENABLED=${REGISTRY_STATIC_TOKEN_AUTH_ENABLED:-false}
      - REGISTRY_API_TOKEN=${REGISTRY_API_TOKEN:-}
      - REGISTRY_API_KEYS=${REGISTRY_API_KEYS:-}
      # Registration Webhook
      - REGISTRATION_WEBHOOK_URL=${REGISTRATION_WEBHOOK_URL:-}
      - REGISTRATION_WEBHOOK_AUTH_HEADER=${REGISTRATION_WEBHOOK_AUTH_HEADER:-Authorization}
      - REGISTRATION_WEBHOOK_AUTH_TOKEN=${REGISTRATION_WEBHOOK_AUTH_TOKEN:-}
      - REGISTRATION_WEBHOOK_TIMEOUT_SECONDS=${REGISTRATION_WEBHOOK_TIMEOUT_SECONDS:-10}
      # Agent Batch API (issue #956)
      - BATCH_WORKER_ENABLED=${BATCH_WORKER_ENABLED:-true}
      - BATCH_MAX_OPERATIONS_PER_JOB=${BATCH_MAX_OPERATIONS_PER_JOB:-1000}
      - BATCH_MAX_CONCURRENT_JOBS_PER_USER=${BATCH_MAX_CONCURRENT_JOBS_PER_USER:-3}
      - BATCH_JOB_RETENTION_DAYS=${BATCH_JOB_RETENTION_DAYS:-7}
      - BATCH_WORKER_POLL_INTERVAL_SECONDS=${BATCH_WORKER_POLL_INTERVAL_SECONDS:-1.0}
      - BATCH_MAX_REQUEST_BYTES=${BATCH_MAX_REQUEST_BYTES:-4194304}
      # Registration Gate (Admission Control)
      - REGISTRATION_GATE_ENABLED=${REGISTRATION_GATE_ENABLED:-false}
      - REGISTRATION_GATE_URL=${REGISTRATION_GATE_URL:-}
      - REGISTRATION_GATE_AUTH_TYPE=${REGISTRATION_GATE_AUTH_TYPE:-none}
      - REGISTRATION_GATE_AUTH_CREDENTIAL=${REGISTRATION_GATE_AUTH_CREDENTIAL:-}
      - REGISTRATION_GATE_AUTH_HEADER_NAME=${REGISTRATION_GATE_AUTH_HEADER_NAME:-X-Api-Key}
      - REGISTRATION_GATE_TIMEOUT_SECONDS=${REGISTRATION_GATE_TIMEOUT_SECONDS:-5}
      - REGISTRATION_GATE_MAX_RETRIES=${REGISTRATION_GATE_MAX_RETRIES:-2}
      - REGISTRATION_GATE_OAUTH2_TOKEN_URL=${REGISTRATION_GATE_OAUTH2_TOKEN_URL:-}
      - REGISTRATION_GATE_OAUTH2_CLIENT_ID=${REGISTRATION_GATE_OAUTH2_CLIENT_ID:-}
      - REGISTRATION_GATE_OAUTH2_CLIENT_SECRET=${REGISTRATION_GATE_OAUTH2_CLIENT_SECRET:-}
      - REGISTRATION_GATE_OAUTH2_SCOPE=${REGISTRATION_GATE_OAUTH2_SCOPE:-}
      # M2M Direct Registration
      - M2M_DIRECT_REGISTRATION_ENABLED=${M2M_DIRECT_REGISTRATION_ENABLED:-true}
      - MAX_TOKENS_PER_USER_PER_HOUR=${MAX_TOKENS_PER_USER_PER_HOUR:-100}
      # OpenTelemetry / OTLP (mirrored for config panel visibility)
      - OTEL_OTLP_ENDPOINT=${OTEL_OTLP_ENDPOINT:-}
      - OTEL_OTLP_EXPORT_INTERVAL_MS=${OTEL_OTLP_EXPORT_INTERVAL_MS:-30000}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-cumulative}
      # Telemetry Configuration
      # Disable all:       set MCP_TELEMETRY_DISABLED=1  to disable all telemetry (startup ping + heartbeat)
      # Heartbeat opt-out: set MCP_TELEMETRY_OPT_OUT=1   to disable daily heartbeat only
      # Heartbeat interval: set MCP_TELEMETRY_HEARTBEAT_INTERVAL_MINUTES=1440  (default: 1440 = 24h)
      # Endpoint: set TELEMETRY_ENDPOINT=<url>   to use a self-hosted collector
      # Debug:    set TELEMETRY_DEBUG=true        to log payloads without sending
      - MCP_TELEMETRY_DISABLED=${MCP_TELEMETRY_DISABLED:-}
      - MCP_TELEMETRY_OPT_OUT=${MCP_TELEMETRY_OPT_OUT:-}
      - MCP_TELEMETRY_HEARTBEAT_INTERVAL_MINUTES=${MCP_TELEMETRY_HEARTBEAT_INTERVAL_MINUTES:-1440}
      - TELEMETRY_DEBUG=${TELEMETRY_DEBUG:-false}
      - MCP_TELEMETRY_IMDS_PROBE_DISABLED=${MCP_TELEMETRY_IMDS_PROBE_DISABLED:-}
      - MCP_CLOUD_PROVIDER=${MCP_CLOUD_PROVIDER:-}
      - DISABLE_AI_REGISTRY_TOOLS_SERVER=${DISABLE_AI_REGISTRY_TOOLS_SERVER:-false}
      # Application Log Configuration (Issue #886)
      - APP_LOG_MAX_BYTES=${APP_LOG_MAX_BYTES:-52428800}
      - APP_LOG_BACKUP_COUNT=${APP_LOG_BACKUP_COUNT:-5}
      - APP_LOG_CENTRALIZED_ENABLED=${APP_LOG_CENTRALIZED_ENABLED:-true}
      - APP_LOG_CENTRALIZED_TTL_DAYS=${APP_LOG_CENTRALIZED_TTL_DAYS:-1}
      - APP_LOG_MONGODB_BUFFER_SIZE=${APP_LOG_MONGODB_BUFFER_SIZE:-50}
      - APP_LOG_MONGODB_FLUSH_INTERVAL_SECONDS=${APP_LOG_MONGODB_FLUSH_INTERVAL_SECONDS:-5.0}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - APP_LOG_EXCLUDED_LOGGERS=${APP_LOG_EXCLUDED_LOGGERS:-uvicorn.access,httpx,pymongo,motor}
      # Application file-log location (Issue #987) + format (json|text)
      - APP_LOG_DIR=${APP_LOG_DIR:-/var/log/containers/ai-registry}
      - APP_LOG_FILE_FORMAT=${APP_LOG_FILE_FORMAT:-json}
      - APP_LOG_CONSOLE_FORMAT=${APP_LOG_CONSOLE_FORMAT:-json}
      # Tool-level access control (Issue #1026)
      - MCP_TOOLS_LIST_FILTER_ENABLED=${MCP_TOOLS_LIST_FILTER_ENABLED:-true}
      - TOOL_FILTER_AUDIT_LOG_LEVEL=${TOOL_FILTER_AUDIT_LOG_LEVEL:-INFO}
      # Custom entity types (admin-defined, schema-driven catalog types)
      - CUSTOM_ENTITY_TYPES_ENABLED=${CUSTOM_ENTITY_TYPES_ENABLED:-false}
      - CUSTOM_TYPE_CACHE_TTL_SECONDS=${CUSTOM_TYPE_CACHE_TTL_SECONDS:-60}
      - MAX_CUSTOM_RECORDS_PER_TYPE=${MAX_CUSTOM_RECORDS_PER_TYPE:-1000}
      - MAX_CUSTOM_TYPES=${MAX_CUSTOM_TYPES:-50}
      # Registry-UI internal token verification (the /api/ hop; mints in auth-server)
      - INTERNAL_TOKEN_TTL_SECONDS=${INTERNAL_TOKEN_TTL_SECONDS:-30}
      - INTERNAL_TOKEN_LEEWAY_SECONDS=${INTERNAL_TOKEN_LEEWAY_SECONDS:-5}
    ports:
      - "80:8080"   # Map host 80 to container 8080 (non-root nginx)
      - "443:8443"  # Map host 443 to container 8443 (non-root nginx)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - path: ${MCP_EXTRA_ENV_DIR:-./extra_env}/registry.env
        required: false
    volumes:
      # User-managed content (bind mounts)
      - ${HOME}/mcp-gateway/servers:/app/registry/servers
      - ${HOME}/mcp-gateway/agents:/app/registry/agents
      - ${HOME}/mcp-gateway/models:/app/registry/models
      - ${HOME}/mcp-gateway/auth_server/scopes.yml:/app/auth_server/scopes.yml
      - ${HOME}/mcp-gateway/federation.json:/app/config/federation.json
      - ${HOME}/mcp-gateway/ssl:/etc/ssl:ro
      - ${HOME}/.aws:/root/.aws:ro
      # Application log files (bind mount to host for Splunk ingestion, Issue #987)
      - /var/log/containers/ai-registry:/var/log/containers/ai-registry
      # Audit logs + security scans (named volumes, unchanged)
      - registry-logs:/app/logs
      - registry-scans:/app/security_scans
    depends_on:
      auth-server:
        condition: service_started
      metrics-service:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Metrics Collection Service
  metrics-service:
    build:
      context: metrics-service
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      - METRICS_SERVICE_PORT=8890
      - METRICS_SERVICE_HOST=0.0.0.0
      - SQLITE_DB_PATH=/var/lib/sqlite/metrics.db
      - METRICS_RETENTION_DAYS=90
      - METRICS_API_KEY_AUTH=${METRICS_API_KEY_AUTH_SERVER}
      - METRICS_API_KEY_REGISTRY=${METRICS_API_KEY_REGISTRY}
      - METRICS_API_KEY_MCPGW=${METRICS_API_KEY_MCPGW_SERVER}
      - OTEL_SERVICE_NAME=mcp-metrics-service
      - OTEL_PROMETHEUS_ENABLED=true
      - OTEL_PROMETHEUS_PORT=9465
      - METRICS_RATE_LIMIT=1000
      - OTEL_OTLP_ENDPOINT=${OTEL_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_OTLP_EXPORT_INTERVAL_MS=${OTEL_OTLP_EXPORT_INTERVAL_MS:-30000}
      - OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE=${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:-cumulative}
    ports:
      - "8890:8890"
      - "9465:9465"  # Prometheus metrics endpoint
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - metrics-db-data:/var/lib/sqlite
      # Application-managed (named volume with proper permissions)
      - metrics-logs:/app/logs
    depends_on:
      - metrics-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8890/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Auth service (separate and scalable)
  auth-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.auth
      args:
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      # Registry Configuration
      - REGISTRY_URL=${REGISTRY_URL:-http://localhost}
      - REGISTRY_NAME=${REGISTRY_NAME:-AI Registry}
      - REGISTRY_ORGANIZATION_NAME=${REGISTRY_ORGANIZATION_NAME:-ACME Inc.}
      - AUTH_SERVER_EXTERNAL_URL=${AUTH_SERVER_EXTERNAL_URL:-http://localhost:8888}
      - SECRET_KEY=${SECRET_KEY}
      # Egress vault: auth-server does the marker check + the vend call to the
      # registry (it does NOT touch the secret store, so no SECRET_STORE/AWS/
      # OPENBAO vars here).
      - EGRESS_AUTH_ENABLED=${EGRESS_AUTH_ENABLED:-false}
      - EGRESS_REGISTRY_INTERNAL_URL=${EGRESS_REGISTRY_INTERNAL_URL:-http://registry:8080}
      - AUTH_SERVER_NGINX_MARKER_SECRET=${AUTH_SERVER_NGINX_MARKER_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_ENABLED=${GITHUB_ENABLED:-false}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - COGNITO_CLIENT_SECRET=${COGNITO_CLIENT_SECRET}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_DOMAIN=${COGNITO_DOMAIN:-auto}
      - COGNITO_ENABLED=${COGNITO_ENABLED:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_ENABLED=${GOOGLE_ENABLED:-false}
      # Metrics configuration
      - METRICS_SERVICE_URL=http://metrics-service:8890
      - METRICS_API_KEY=${METRICS_API_KEY_AUTH_SERVER}
      # OTel-native metrics emission (issue #1122)
      - METRICS_LEGACY_HTTP_POST=${METRICS_LEGACY_HTTP_POST:-false}
      - OTEL_METRIC_EXPORT_INTERVAL_MS=${OTEL_METRIC_EXPORT_INTERVAL_MS:-15000}
      - OTEL_EXPORTER_PROMETHEUS_HOST=${OTEL_EXPORTER_PROMETHEUS_HOST:-0.0.0.0}
      - OTEL_EXPORTER_PROMETHEUS_PORT=${OTEL_EXPORTER_PROMETHEUS_PORT:-9464}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=mcp-auth-server
      # Keycloak configuration
      - AUTH_PROVIDER=${AUTH_PROVIDER:-cognito}  # 'cognito' or 'keycloak'
      - KEYCLOAK_ENABLED=${KEYCLOAK_ENABLED:-true}  # Enable Keycloak by default
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_EXTERNAL_URL=${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-mcp-gateway}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-mcp-gateway-web}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_M2M_CLIENT_ID=${KEYCLOAK_M2M_CLIENT_ID:-mcp-gateway-m2m}
      - KEYCLOAK_M2M_CLIENT_SECRET=${KEYCLOAK_M2M_CLIENT_SECRET}
      # IDE OAuth login public client_id (PR #1224). The auth-server accepts
      # access tokens from this client (Cognito allowlist). Public, not a secret.
      - IDE_OAUTH_CLIENT_ID=${IDE_OAUTH_CLIENT_ID:-}
      # Entra ID configuration
      - ENTRA_TENANT_ID=${ENTRA_TENANT_ID}
      - ENTRA_CLIENT_ID=${ENTRA_CLIENT_ID}
      - ENTRA_CLIENT_SECRET=${ENTRA_CLIENT_SECRET}
      - ENTRA_ENABLED=${ENTRA_ENABLED:-false}
      - ENTRA_APPLICATION_ID_URI=${ENTRA_APPLICATION_ID_URI:-}
      # IdP group filtering (applies to all identity providers)
      - IDP_GROUP_FILTER_PREFIX=${IDP_GROUP_FILTER_PREFIX:-}
      # Login-time IdP group allowlist (blank = auto-derive from scope mappings)
      - ALLOWED_IDP_GROUPS=${ALLOWED_IDP_GROUPS:-}
      # IdP user-to-group fallback (issue #1127)
      - IDP_USER_GROUP_FALLBACK_ENABLED_PROVIDERS=${IDP_USER_GROUP_FALLBACK_ENABLED_PROVIDERS:-pingfederate}
      # Okta configuration
      - OKTA_DOMAIN=${OKTA_DOMAIN:-}
      - OKTA_CLIENT_ID=${OKTA_CLIENT_ID:-}
      - OKTA_CLIENT_SECRET=${OKTA_CLIENT_SECRET:-}
      - OKTA_M2M_CLIENT_ID=${OKTA_M2M_CLIENT_ID:-}
      - OKTA_M2M_CLIENT_SECRET=${OKTA_M2M_CLIENT_SECRET:-}
      - OKTA_API_TOKEN=${OKTA_API_TOKEN:-}
      - OKTA_AUTH_SERVER_ID=${OKTA_AUTH_SERVER_ID:-}
      # Auth0 configuration
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_GROUPS_CLAIM=${AUTH0_GROUPS_CLAIM:-https://mcp-gateway/groups}
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - AUTH0_M2M_CLIENT_ID=${AUTH0_M2M_CLIENT_ID:-}
      - AUTH0_M2M_CLIENT_SECRET=${AUTH0_M2M_CLIENT_SECRET:-}
      # PingFederate configuration
      - PINGFEDERATE_BASE_URL=${PINGFEDERATE_BASE_URL:-}
      - PINGFEDERATE_EXTERNAL_URL=${PINGFEDERATE_EXTERNAL_URL:-}
      - PINGFEDERATE_CLIENT_ID=${PINGFEDERATE_CLIENT_ID:-}
      - PINGFEDERATE_CLIENT_SECRET=${PINGFEDERATE_CLIENT_SECRET:-}
      - PINGFEDERATE_M2M_CLIENT_ID=${PINGFEDERATE_M2M_CLIENT_ID:-}
      - PINGFEDERATE_M2M_CLIENT_SECRET=${PINGFEDERATE_M2M_CLIENT_SECRET:-}
      - PINGFEDERATE_APPLICATION_ID_URI=${PINGFEDERATE_APPLICATION_ID_URI:-}
      - PINGFEDERATE_GROUPS_CLAIM=${PINGFEDERATE_GROUPS_CLAIM:-groups}
      - PINGFEDERATE_ENABLED=${PINGFEDERATE_ENABLED:-false}
      # Storage Backend Configuration
      - STORAGE_BACKEND=${STORAGE_BACKEND:-file}
      # DocumentDB/MongoDB Configuration (when STORAGE_BACKEND=documentdb or mongodb-ce)
      # MONGODB_CONNECTION_STRING: Optional full URI override (e.g. for MongoDB
      # Atlas, mongodb+srv://...). When set, takes precedence over the discrete
      # DOCUMENTDB_* values below.
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING:-}
      - DOCUMENTDB_HOST=${DOCUMENTDB_HOST:-mongodb}
      - DOCUMENTDB_PORT=${DOCUMENTDB_PORT:-27017}
      - DOCUMENTDB_USERNAME=${DOCUMENTDB_USERNAME}
      - DOCUMENTDB_PASSWORD=${DOCUMENTDB_PASSWORD}
      - DOCUMENTDB_DATABASE=${DOCUMENTDB_DATABASE:-mcp_registry}
      - DOCUMENTDB_NAMESPACE=${DOCUMENTDB_NAMESPACE:-default}
      - DOCUMENTDB_USE_TLS=${DOCUMENTDB_USE_TLS:-false}
      - DOCUMENTDB_TLS_CA_FILE=${DOCUMENTDB_TLS_CA_FILE}
      - DOCUMENTDB_USE_IAM=${DOCUMENTDB_USE_IAM:-false}
      - DOCUMENTDB_REPLICA_SET=${DOCUMENTDB_REPLICA_SET:-rs0}
      - DOCUMENTDB_READ_PREFERENCE=${DOCUMENTDB_READ_PREFERENCE:-secondaryPreferred}
      # Registry API static token auth (IdP-independent access)
      - REGISTRY_STATIC_TOKEN_AUTH_ENABLED=${REGISTRY_STATIC_TOKEN_AUTH_ENABLED:-false}
      - REGISTRY_API_TOKEN=${REGISTRY_API_TOKEN:-}
      - REGISTRY_API_KEYS=${REGISTRY_API_KEYS:-}
      # Federation static token auth (scoped access for peer registries)
      - FEDERATION_STATIC_TOKEN_AUTH_ENABLED=${FEDERATION_STATIC_TOKEN_AUTH_ENABLED:-false}
      - FEDERATION_STATIC_TOKEN=${FEDERATION_STATIC_TOKEN:-}
      # Application Log Configuration (Issue #886)
      - APP_LOG_MAX_BYTES=${APP_LOG_MAX_BYTES:-52428800}
      - APP_LOG_BACKUP_COUNT=${APP_LOG_BACKUP_COUNT:-5}
      - APP_LOG_CENTRALIZED_ENABLED=${APP_LOG_CENTRALIZED_ENABLED:-true}
      - APP_LOG_CENTRALIZED_TTL_DAYS=${APP_LOG_CENTRALIZED_TTL_DAYS:-1}
      - APP_LOG_MONGODB_BUFFER_SIZE=${APP_LOG_MONGODB_BUFFER_SIZE:-50}
      - APP_LOG_MONGODB_FLUSH_INTERVAL_SECONDS=${APP_LOG_MONGODB_FLUSH_INTERVAL_SECONDS:-5.0}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - APP_LOG_EXCLUDED_LOGGERS=${APP_LOG_EXCLUDED_LOGGERS:-uvicorn.access,httpx,pymongo,motor}
      # Application file-log location (Issue #987) + format (json|text)
      - APP_LOG_DIR=${APP_LOG_DIR:-/var/log/containers/ai-registry}
      - APP_LOG_FILE_FORMAT=${APP_LOG_FILE_FORMAT:-json}
      - APP_LOG_CONSOLE_FORMAT=${APP_LOG_CONSOLE_FORMAT:-json}
      # Tool-level access control (Issue #1026)
      - MCP_TOOLS_LIST_FILTER_ENABLED=${MCP_TOOLS_LIST_FILTER_ENABLED:-true}
      - MCP_PROXY_MAX_BODY_BYTES=${MCP_PROXY_MAX_BODY_BYTES:-2097152}
      - TOOL_FILTER_AUDIT_LOG_LEVEL=${TOOL_FILTER_AUDIT_LOG_LEVEL:-INFO}
      - INTERNAL_TOKEN_TTL_SECONDS=${INTERNAL_TOKEN_TTL_SECONDS:-30}
      - INTERNAL_TOKEN_LEEWAY_SECONDS=${INTERNAL_TOKEN_LEEWAY_SECONDS:-5}
    ports:
      - "8888:8888"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - path: ${MCP_EXTRA_ENV_DIR:-./extra_env}/auth-server.env
        required: false
    volumes:
      # Application log files (bind mount to host for Splunk ingestion, Issue #987)
      - /var/log/containers/ai-registry:/var/log/containers/ai-registry
      # Audit logs (named volume, unchanged)
      - auth-logs:/app/logs
      # - ${HOME}/mcp-gateway/auth_server/scopes.yml:/app/scopes.yml
    depends_on:
      metrics-service:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Current Time MCP Server
  currenttime-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server-light
      args:
        SERVER_DIR: servers/currenttime
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MCP_TRANSPORT=streamable-http
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Financial Info MCP Server
  fininfo-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server-light
      args:
        SERVER_DIR: servers/fininfo
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      - PORT=8001
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ${HOME}/mcp-gateway/secrets/fininfo/:/app/fininfo/
    ports:
      - "8001:8001"
    restart: unless-stopped

  # MCP Gateway Server
  mcpgw-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server
      args:
        SERVER_DIR: servers/mcpgw
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      - HOST=0.0.0.0
      - PORT=8003
      - REGISTRY_BASE_URL=http://registry:8080
      - REGISTRY_EXTERNAL_URL=${REGISTRY_URL:-http://localhost}
      # Application file-log location (Issue #987) + format (json|text)
      - APP_LOG_DIR=${APP_LOG_DIR:-/var/log/containers/ai-registry}
      - APP_LOG_FILE_FORMAT=${APP_LOG_FILE_FORMAT:-json}
      - APP_LOG_CONSOLE_FORMAT=${APP_LOG_CONSOLE_FORMAT:-json}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-INFO}
      - APP_LOG_MAX_BYTES=${APP_LOG_MAX_BYTES:-52428800}
      - APP_LOG_BACKUP_COUNT=${APP_LOG_BACKUP_COUNT:-5}
      # OTel-native metrics emission (issue #1122)
      - METRICS_LEGACY_HTTP_POST=${METRICS_LEGACY_HTTP_POST:-false}
      - OTEL_METRIC_EXPORT_INTERVAL_MS=${OTEL_METRIC_EXPORT_INTERVAL_MS:-15000}
      - OTEL_EXPORTER_PROMETHEUS_HOST=${OTEL_EXPORTER_PROMETHEUS_HOST:-0.0.0.0}
      - OTEL_EXPORTER_PROMETHEUS_PORT=${OTEL_EXPORTER_PROMETHEUS_PORT:-9464}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}
      - OTEL_SERVICE_NAME=mcp-mcpgw
    env_file:
      - path: ${MCP_EXTRA_ENV_DIR:-./extra_env}/mcpgw.env
        required: false
    volumes:
      - ${HOME}/mcp-gateway/servers:/app/registry/servers
      - ${HOME}/mcp-gateway/models:/app/registry/models
      - ${HOME}/mcp-gateway/auth_server/scopes.yml:/app/auth_server/scopes.yml
      # Application log file (bind mount to host for Splunk ingestion, Issue #987)
      - /var/log/containers/ai-registry:/var/log/containers/ai-registry
    ports:
      - "8003:8003"
    depends_on:
      - registry
    restart: unless-stopped

  # Real Server Fake Tools MCP Server
  realserverfaketools-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-server-light
      args:
        SERVER_DIR: servers/realserverfaketools
        BUILD_VERSION: ${BUILD_VERSION:-1.0.0}
    environment:
      - PORT=8002
    ports:
      - "8002:8002"
    restart: unless-stopped

  # SQLite container for metrics database
  metrics-db:
    build:
      context: .
      dockerfile: docker/Dockerfile.metrics-db
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - metrics-db-data:/var/lib/sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlite3", "/var/lib/sqlite/metrics.db", ".tables"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OpenTelemetry Collector (Issue #1122)
  # Receives OTLP from registry/auth-server/mcpgw on :4317, re-exports as
  # Prometheus on :8889, and logs everything via the debug exporter.
  # Used for local verification; the OTLP push pipeline is also exercised
  # on ECS via per-task ADOT sidecars and on EKS via the operator's own
  # collector.
  #
  # For a graphical trace UI (Jaeger, Tempo, etc.), see the "Adding a
  # graphical trace UI" section of docs/OBSERVABILITY.md for the small
  # config additions you can drop in.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (services push here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter on the collector itself
      - "13133:13133" # health_check extension
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v3.11.3
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:12.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # PostgreSQL database for Keycloak
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev  # Use 'start' for production with proper SSL
    environment:
      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}

      # Admin credentials
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # HTTP configuration
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_PROXY: edge  # Running behind nginx

      # Frontend URL for external JWT issuer
      KC_FRONTEND_URL: ${KEYCLOAK_EXTERNAL_URL:-http://localhost:8080}

      # Features
      KC_FEATURES: token-exchange,admin-api

      # Logging
      KC_LOG_LEVEL: INFO

    ports:
      - "8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      keycloak-db:
        condition: service_healthy
    volumes:
      - ./keycloak/themes:/opt/keycloak/themes
      - ./keycloak/providers:/opt/keycloak/providers
      - ./keycloak/import:/opt/keycloak/data/import
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  pingfederate:
    image: pingidentity/pingfederate:latest
    container_name: pingfederate
    profiles: ["pingfederate"]
    environment:
      - PING_IDENTITY_ACCEPT_EULA=${PING_IDENTITY_ACCEPT_EULA}
      - PING_IDENTITY_DEVOPS_USER=${PING_IDENTITY_DEVOPS_USER}
      - PING_IDENTITY_DEVOPS_KEY=${PING_IDENTITY_DEVOPS_KEY}
      - SERVER_PROFILE_URL=https://github.com/pingidentity/pingidentity-server-profiles.git
      - SERVER_PROFILE_PATH=baseline/pingfederate
    ports:
      - "9031:9031"
      - "9032:9032"
      - "9999:9999"
    volumes:
      - pingfederate-data:/opt/out/instance/server/default/data
      - ./pingfederate/config/run.properties:/opt/staging/instance/bin/run.properties
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -ksf https://localhost:9031/pf/heartbeat.ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 180s

volumes:
  ssl_data:
  keycloak_db_data:
  metrics-db-data:
  prometheus-data:
  grafana-data:
  mongodb-data:
  mongodb-config:
  pingfederate-data:
  # Application logs and scans (managed by containers, proper permissions)
  registry-logs:
  registry-scans:
  auth-logs:
  metrics-logs:
