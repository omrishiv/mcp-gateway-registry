    }
    # {{PINGFEDERATE_LOCATIONS_END}}

    # Anthropic MCP Registry API - Public REST API with JWT authentication
    location {{ROOT_PATH}}/{{ANTHROPIC_API_VERSION}}/ {
        # Mark this as a registry-API request (rewrite phase) so the shared
        # /validate subrequest forwards X-Registry-Api-Auth and /validate mints the
        # registry-UI internal token. Set inside the location (NOT a server-scope
        # default), which the auth_request subrequest would clobber.
        set $registry_api_auth "1";

        # Authenticate request via auth server (validates JWT Bearer tokens)
        auth_request /validate;

        # Capture auth server response headers
        auth_request_set $auth_user $upstream_http_x_user;
        auth_request_set $auth_username $upstream_http_x_username;
        auth_request_set $auth_client_id $upstream_http_x_client_id;
        auth_request_set $auth_scopes $upstream_http_x_scopes;
        auth_request_set $auth_method $upstream_http_x_auth_method;
        # Capture the /validate-minted registry-UI token (binds verified identity).
        # The registry verifies this instead of trusting the forgeable X-* headers.
        auth_request_set $auth_internal_token_registry $upstream_http_x_internal_token_registry;
        auth_request_set $auth_groups $upstream_http_x_groups;

        # Proxy to registry service
        proxy_pass http://127.0.0.1:7860/{{ANTHROPIC_API_VERSION}}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Forward validated auth context to FastAPI
        proxy_set_header X-User $auth_user;
        proxy_set_header X-Username $auth_username;
        proxy_set_header X-Client-Id $auth_client_id;
        proxy_set_header X-Scopes $auth_scopes;
        proxy_set_header X-Auth-Method $auth_method;
        # The internal token the registry verifies (it ignores the X-* headers above).
        proxy_set_header X-Internal-Token-Registry $auth_internal_token_registry;
        proxy_set_header X-Groups $auth_groups;

        # Pass through original Authorization header
        proxy_set_header Authorization $http_authorization;

        # Pass all request headers
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Handle auth errors
        error_page 401 = @auth_error;
        error_page 403 = @forbidden_error;

        # CORS headers (for browser clients)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-User-Pool-Id, X-Client-Id, X-Region, X-Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # A2A Agent API - Internal API with JWT authentication
    # Public API endpoints (no authentication required)

    # /api/auth/me requires authentication (exact match takes precedence over prefix)
    location = {{ROOT_PATH}}/api/auth/me {
        # Mark this as a registry-API request (rewrite phase) so the shared
        # /validate subrequest forwards X-Registry-Api-Auth and /validate mints the
        # registry-UI internal token. Set inside the location (NOT a server-scope
        # default), which the auth_request subrequest would clobber.
        set $registry_api_auth "1";

        # Authenticate request via auth server (validates JWT Bearer tokens)
        auth_request /validate;

        # Capture auth server response headers
        auth_request_set $auth_user $upstream_http_x_user;
        auth_request_set $auth_username $upstream_http_x_username;
        auth_request_set $auth_client_id $upstream_http_x_client_id;
        auth_request_set $auth_scopes $upstream_http_x_scopes;
        auth_request_set $auth_method $upstream_http_x_auth_method;
        # Capture the /validate-minted registry-UI token (binds verified identity).
        # The registry verifies this instead of trusting the forgeable X-* headers.
        auth_request_set $auth_internal_token_registry $upstream_http_x_internal_token_registry;
        auth_request_set $auth_groups $upstream_http_x_groups;

        # Proxy to FastAPI service
        proxy_pass http://127.0.0.1:7860/api/auth/me;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Forward validated auth context to FastAPI
        proxy_set_header X-User $auth_user;
        proxy_set_header X-Username $auth_username;
        proxy_set_header X-Client-Id $auth_client_id;
        proxy_set_header X-Scopes $auth_scopes;
        proxy_set_header X-Auth-Method $auth_method;
        # The internal token the registry verifies (it ignores the X-* headers above).
        proxy_set_header X-Internal-Token-Registry $auth_internal_token_registry;
        proxy_set_header X-Groups $auth_groups;

        # Pass through original Authorization header
        proxy_set_header Authorization $http_authorization;

        # Pass all request headers
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Handle auth errors
        error_page 401 = @auth_error;
        error_page 403 = @forbidden_error;
    }

    # Public auth endpoints - no authentication required (priority prefix match)
    location ^~ {{ROOT_PATH}}/api/auth {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Public health endpoint - no authentication required (priority prefix match)
    location ^~ {{ROOT_PATH}}/api/health {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Public version endpoint - no authentication required (priority prefix match)
    location ^~ {{ROOT_PATH}}/api/version {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location {{ROOT_PATH}}/api/ {
        # Mark this as a registry-API request (rewrite phase) so the shared
        # /validate subrequest forwards X-Registry-Api-Auth and /validate mints the
        # registry-UI internal token. Set inside the location (NOT a server-scope
        # default), which the auth_request subrequest would clobber.
        set $registry_api_auth "1";

        # Authenticate request via auth server (validates JWT Bearer tokens)
        auth_request /validate;

        # Capture auth server response headers
        auth_request_set $auth_user $upstream_http_x_user;
        auth_request_set $auth_username $upstream_http_x_username;
        auth_request_set $auth_client_id $upstream_http_x_client_id;
        auth_request_set $auth_scopes $upstream_http_x_scopes;
        auth_request_set $auth_method $upstream_http_x_auth_method;
        # Capture the /validate-minted registry-UI token (binds verified identity).
        # The registry verifies this instead of trusting the forgeable X-* headers.
        auth_request_set $auth_internal_token_registry $upstream_http_x_internal_token_registry;
        auth_request_set $auth_groups $upstream_http_x_groups;

        # Proxy to FastAPI service
        proxy_pass http://127.0.0.1:7860/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Forward validated auth context to FastAPI
        proxy_set_header X-User $auth_user;
        proxy_set_header X-Username $auth_username;
        proxy_set_header X-Client-Id $auth_client_id;
        proxy_set_header X-Scopes $auth_scopes;
        proxy_set_header X-Auth-Method $auth_method;
        # The internal token the registry verifies (it ignores the X-* headers above).
        proxy_set_header X-Internal-Token-Registry $auth_internal_token_registry;
        proxy_set_header X-Groups $auth_groups;

        # Pass through original Authorization header
        proxy_set_header Authorization $http_authorization;

        # Pass all request headers
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Handle auth errors
        error_page 401 = @auth_error;
        error_page 403 = @forbidden_error;
    }

    # {{KEYCLOAK_LOCATIONS_START}}
    # Keycloak proxy
    location /keycloak/ {
        proxy_pass {{KEYCLOAK_SCHEME}}://{{KEYCLOAK_HOST}}:{{KEYCLOAK_PORT}}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Keycloak specific headers
        proxy_set_header X-Forwarded-Port $real_port;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Keycloak realms proxy (for authentication endpoints)
    location /realms/ {
        proxy_pass {{KEYCLOAK_SCHEME}}://{{KEYCLOAK_HOST}}:{{KEYCLOAK_PORT}}/realms/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Keycloak specific headers
        proxy_set_header X-Forwarded-Port $real_port;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Keycloak resources proxy (for CSS, JS, images)
    location /resources/ {
        proxy_pass {{KEYCLOAK_SCHEME}}://{{KEYCLOAK_HOST}}:{{KEYCLOAK_PORT}}/resources/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Static resource caching
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # OAuth2 Keycloak callback endpoint
    location /oauth2/callback/keycloak {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/callback/keycloak;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Pass through all headers for OAuth2 flow
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
    }

    # OAuth2 Keycloak login endpoint
    location /oauth2/login/keycloak {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/login/keycloak;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # Pass through query parameters and headers
        proxy_pass_request_headers on;
    }
    # {{KEYCLOAK_LOCATIONS_END}}

    # Error handlers for authentication failures
    # WWW-Authenticate is mandated by RFC 9728 §5.1 and the MCP 2025-06-18
    # authorization spec. The resource_metadata URL must match the `resource`
    # field returned by /.well-known/oauth-protected-resource byte-for-byte.
    location @auth_error {
        add_header WWW-Authenticate 'Bearer realm="mcp", resource_metadata="$mcp_resource_metadata"' always;
        add_header Content-Type application/json always;
        add_header Connection close always;
        return 401 '{"error": "Authentication required"}';
    }

    location @forbidden_error {
        default_type application/json;
        return 403 '{"error": "Access forbidden"}';
        add_header Content-Type application/json always;
        add_header Connection close always;
    }

    # Issue #987: nginx logs moved to /var/log/containers/ai-registry so host-side
    # Splunk forwarders can ingest them. Rotated by /etc/logrotate.d/nginx-mcp.
    access_log /var/log/containers/ai-registry/nginx-access.log combined;
    error_log  /var/log/containers/ai-registry/nginx-error.log warn;
}

# Keep the HTTPS server for clients that prefer it
server {
    listen 8443 ssl;
    # {{ADDITIONAL_SERVER_NAMES}} is replaced with custom domains/IPs for gateway access
    server_name localhost {{ADDITIONAL_SERVER_NAMES}};

    # SSL Configuration - requires user-provided certificates
    # Mount certificates to /etc/ssl/certs/fullchain.pem and /etc/ssl/private/privkey.pem
    ssl_certificate /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    # Stronger cipher suite
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # NOTE: no server-scope `set $backend_url "";` here -- it would be re-run by
    # the /validate auth_request subrequest and clobber the per-server upstream,
    # breaking internal-token minting. See the :8080 server block for the full
    # explanation.

    # Custom error page for 502 Bad Gateway (shown during backend startup)
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Add this to trigger the named location for 403 errors
    error_page 403 = @forbidden_error;

    # Auth validation endpoint - passes entire request to auth server
    location = /validate {
        internal;

        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/validate;

        # Pass original request info
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$host$request_uri;

        # Forward the resolved MCP upstream (set in the /mcp-proxy/ block's rewrite
        # phase, empty elsewhere) so /validate can bind it into the internal token.
        proxy_set_header X-Resolved-Upstream $backend_url;

        # B2-4b egress marker: force-set the shared secret so auth_server knows
        # this /validate subrequest came from nginx (not a direct :8888 caller).
        # proxy_set_header REPLACES any client-supplied X-Validate-Source-Secret.
        proxy_set_header X-Validate-Source-Secret "{{NGINX_MARKER_SECRET}}";

        # Forward the registry-API marker (set in the /api/ blocks' rewrite phase,
        # empty elsewhere) so /validate mints the registry-UI internal token.
        proxy_set_header X-Registry-Api-Auth $registry_api_auth;

        # Extract and pass Cognito config headers from original request
        proxy_set_header X-User-Pool-Id $http_x_user_pool_id;
        proxy_set_header X-Client-Id $http_x_client_id;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Authorization $http_x_authorization;

        # Pass all original headers (including Authorization and X-Body from Lua)
        proxy_pass_request_headers on;

        # Short timeouts for auth validation
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Egress credential vault OAuth callback (per-user 3LO). Goes to the REGISTRY
    # (not auth-server), and has NO auth_request /validate -- the signed+encrypted
    # state is the authority. Exact match so it wins over /oauth2/callback/*.
    location = /oauth2/egress/callback {
        proxy_pass http://127.0.0.1:7860/api/oauth2/egress/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;
    }

    # Egress OAuth AS facade (IDE-driven egress consent). The discovery +
    # authorize/token/register endpoints
    #   /.well-known/oauth-protected-resource/<server>
    #   /.well-known/oauth-authorization-server/oauth2/egress
    #   /oauth2/egress/{authorize,token,register}
    # are served by the REGISTRY and ride the catch-all `location /` above
    # (mounted at root, no /api prefix, so the URLs match the WWW-Authenticate
    # challenge byte-for-byte). They need no dedicated block.
    #
    # INVARIANT: do NOT enable `proxy_intercept_errors on;` (it is off by
    # default). The egress consent 401 is an UPSTREAM response from the
    # auth-server mcp_proxy hop (emitted AFTER /validate already returned 200 --
    # the user is authenticated but lacks the third-party token). With intercept
    # off, that 401 + its egress `WWW-Authenticate` passes through to the client
    # untouched. Turning intercept on would route it through @auth_error and
    # overwrite the egress resource_metadata with the INGRESS one, breaking the
    # IDE's egress OAuth discovery.

    # OAuth2 Cognito callback endpoint
    location /oauth2/callback/cognito {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/callback/cognito;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

