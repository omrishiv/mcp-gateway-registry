# Nginx configuration directive for handling long server names
server_names_hash_bucket_size 128;

# Increase header buffer sizes for large OAuth tokens (Auth0, Entra ID)
large_client_header_buffers 4 32k;
proxy_buffer_size 16k;
proxy_buffers 4 16k;

# Variables hash configuration - needed for large number of auth_request_set variables
# With multiple location blocks each setting 5+ variables, we need larger hash tables
variables_hash_max_size 2048;
variables_hash_bucket_size 128;

# Lua shared dictionary for metrics collection (10MB)
lua_shared_dict metrics_buffer 10m;

# Lua shared dictionary for virtual server routing mappings (2MB)
lua_shared_dict virtual_server_map 2m;

# Background flush of metrics buffer to metrics-service
init_worker_by_lua_file /etc/nginx/lua/flush_metrics.lua;

# Map to determine the real client scheme
# Uses X-Forwarded-Proto from ALB/load balancer if present, otherwise falls back to $scheme
# This is critical for OAuth2 redirect URIs when HTTPS termination happens at the ALB
map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
    http    http;
}

# Map to determine the real client port
# Uses X-Forwarded-Port from ALB/load balancer if present, otherwise maps internal
# container ports (8080/8443) to their standard external equivalents (80/443)
# This is critical for Keycloak URL generation when running behind a reverse proxy
map $http_x_forwarded_port $real_port {
    default         $http_x_forwarded_port;
    ""              $standard_port;
}

# Map internal container listen ports to standard external ports
map $server_port $standard_port {
    8080    80;
    8443    443;
    default $server_port;
}

# Declare $backend_url at http scope with an empty default. It is referenced in the
# shared `location = /validate` block but only `set` inside the generated /mcp-proxy/
# location blocks. When no such block renders (no healthy MCP server, or registry-only
# mode), the `$backend_url` reference would otherwise be an UNKNOWN variable and nginx
# fails to start with `[emerg] unknown "backend_url" variable`. A `map` default declares
# the variable globally; a location-level `set $backend_url ...` overrides it per-request.
# Unlike a server-scope `set` (which the auth_request subrequest re-runs and clobbers), a
# map is evaluated lazily and is NOT clobbered -- safe for the /validate subrequest.
map $host $backend_url {
    default "";
}

# Declare $registry_api_auth at http scope (same rationale as $backend_url above): it is
# referenced in the shared /validate block but only `set` inside the /api/ location blocks,
# so without a default declaration nginx fails to start on requests that render no /api/ block.
map $host $registry_api_auth {
    default "";
}

# Per-server WWW-Authenticate resource_metadata for MCP auth-failure 401s.
# Default is the GLOBAL ingress PRM (Keycloak) -- non-egress servers use this.
# EGRESS-configured servers `set $mcp_resource_metadata "<facade per-server PRM>"`
# inside their /<server>/mcp location (rewrite phase, like $backend_url), so the
# value flows into @auth_error and the client discovers the gateway egress AS
# from its FIRST unauthenticated 401 (binding /<server> to the facade, not
# Keycloak). Declared at http scope so a request rendering no per-server `set`
# still resolves to the default (same rationale as $backend_url above).
map $host $mcp_resource_metadata {
    default "{{MCP_RESOURCE_METADATA_URL}}";
}

{{VERSION_MAP}}
# First server block now directly handles HTTP requests instead of redirecting
server {
    listen 8080;
    # {{ADDITIONAL_SERVER_NAMES}} is replaced with custom domains/IPs for gateway access
    server_name localhost {{ADDITIONAL_SERVER_NAMES}};

    # NOTE: do NOT add a server-scope `set $backend_url "";` default here.
    # nginx auth_request creates the /validate subrequest via
    # ngx_http_subrequest(), which sets sr->variables = r->variables -- the
    # subrequest shares the parent's variable array by pointer. The subrequest
    # then re-runs the full pipeline including the SERVER-level rewrite phase,
    # so a server-scope `set $backend_url ""` executes during the subrequest
    # and mutates the shared array, clobbering the value the parent's
    # /mcp-proxy/ location already wrote. /validate then forwards an empty
    # X-Resolved-Upstream, _attach_mcp_proxy_token() short-circuits, no
    # X-Internal-Token is minted, and mcp_proxy 401s every MCP call with
    # "Missing internal proxy token". $backend_url is set ONLY inside the
    # generated /mcp-proxy/ location blocks. Non-MCP locations that share
    # /validate (e.g. /api/) forward the map default (empty) for $backend_url.
    #
    # $backend_url MUST be declared at http scope via `map $host $backend_url { default ""; }`
    # near the top of this file. Without that declaration, when no /mcp-proxy/ block renders
    # (no healthy MCP server / registry-only mode), the `$backend_url` reference in /validate
    # is an UNKNOWN variable and nginx fails to start with `[emerg] unknown "backend_url"
    # variable`. The map is clobber-safe (evaluated lazily, not re-run in the subrequest
    # rewrite phase like a server `set`); a location `set $backend_url ...` still overrides
    # the map default per-request.

    # Custom error page for 502 Bad Gateway (shown during backend startup)
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Add this to trigger the named location for 403 errors
    error_page 403 = @forbidden_error;

    # Registered MCP server locations (generated dynamically)
{{LOCATION_BLOCKS}}

{{REGISTRY_ONLY_BLOCK}}

    # Internal session management for virtual MCP server router
    location /_internal/sessions/ {
        internal;
        proxy_pass http://127.0.0.1:7860/api/internal/sessions/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Content-Type application/json;
    }

    # Egress-token vend endpoint (per-user credential vault). The registry app
    # binds loopback, so auth_server reaches it through nginx. Deliberately NOT
    # under /api/ (which applies auth_request /validate and would reject the
    # service-token call) and NOT `internal;` (auth_server is a genuine
    # cross-container client). Gated by validate_internal_auth (mcp-registry
    # service JWT) + the re-verified X-Internal-Token at the app, so a caller
    # without SECRET_KEY cannot use it.
    location = /_egress_internal/egress-token {
        proxy_pass http://127.0.0.1:7860/api/internal/egress-token;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
    }

    # Virtual MCP server locations (generated dynamically)
{{VIRTUAL_SERVER_BLOCKS}}

    # Serve static files directly from nginx (more efficient than proxying)
    location /static/ {
        alias /app/frontend/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        alias /app/frontend/build/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Route for Cost Explorer service
    location / {
        proxy_pass http://127.0.0.1:7860/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }

    # Auth validation endpoint - passes entire request to auth server
    location = /validate {
        internal;

        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/validate;

        # Pass original request info
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$host$request_uri;

        # Forward the resolved MCP upstream (set in the /mcp-proxy/ block's rewrite
        # phase, empty elsewhere) so /validate can bind it into the internal token.
        proxy_set_header X-Resolved-Upstream $backend_url;

        # B2-4b egress marker: force-set the shared secret so auth_server knows
        # this /validate subrequest came from nginx (not a direct :8888 caller).
        # proxy_set_header REPLACES any client-supplied X-Validate-Source-Secret.
        proxy_set_header X-Validate-Source-Secret "{{NGINX_MARKER_SECRET}}";

        # Forward the registry-API marker (set in the /api/ blocks' rewrite phase,
        # empty elsewhere) so /validate mints the registry-UI internal token.
        proxy_set_header X-Registry-Api-Auth $registry_api_auth;

        # Extract and pass Cognito config headers from original request
        proxy_set_header X-User-Pool-Id $http_x_user_pool_id;
        proxy_set_header X-Client-Id $http_x_client_id;
        proxy_set_header X-Region $http_x_region;
        proxy_set_header X-Authorization $http_x_authorization;


        # Pass all original headers (including Authorization and X-Body from Lua)
        proxy_pass_request_headers on;

        # Short timeouts for auth validation
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Egress credential vault OAuth callback (per-user 3LO). Goes to the REGISTRY
    # (not auth-server), and has NO auth_request /validate -- the signed+encrypted
    # state is the authority. Exact match so it wins over /oauth2/callback/*.
    location = /oauth2/egress/callback {
        proxy_pass http://127.0.0.1:7860/api/oauth2/egress/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_pass_request_headers on;
    }

    # Egress OAuth AS facade (IDE-driven egress consent). The discovery +
    # authorize/token/register endpoints
    #   /.well-known/oauth-protected-resource/<server>
    #   /.well-known/oauth-authorization-server/oauth2/egress
    #   /oauth2/egress/{authorize,token,register}
    # are served by the REGISTRY and ride the catch-all `location /` above
    # (mounted at root, no /api prefix, so the URLs match the WWW-Authenticate
    # challenge byte-for-byte). They need no dedicated block.
    #
    # INVARIANT: do NOT enable `proxy_intercept_errors on;` (it is off by
    # default). The egress consent 401 is an UPSTREAM response from the
    # auth-server mcp_proxy hop (emitted AFTER /validate already returned 200 --
    # the user is authenticated but lacks the third-party token). With intercept
    # off, that 401 + its egress `WWW-Authenticate` passes through to the client
    # untouched. Turning intercept on would route it through @auth_error and
    # overwrite the egress resource_metadata with the INGRESS one, breaking the
    # IDE's egress OAuth discovery.

    # OAuth2 Cognito callback endpoint
    location /oauth2/callback/cognito {
        proxy_pass http://{{AUTH_SERVER_HOST}}:{{AUTH_SERVER_PORT}}/oauth2/callback/cognito;
