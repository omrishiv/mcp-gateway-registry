name: Build Registry Image

on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'auth_server/**'
      - 'api/**'
      - 'common/**'
      - 'frontend/**'
      - 'scripts/**'
      - 'docker/Dockerfile.registry'
      - 'docker/registry-entrypoint.sh'
      - 'pyproject.toml'
      - '.github/workflows/build-registry.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/_build-image.yml
    with:
      image_name: p3v1o3c6/registry
      dockerfile: docker/Dockerfile.registry
      timeout_minutes: 45
      role_session_name: registry-build
      summary_title: Registry Image Published
    secrets:
      ECR_ROLE: ${{ secrets.ECR_ROLE }}
