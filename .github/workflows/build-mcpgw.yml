name: Build MCPGW Image

on:
  push:
    branches: [main]
    paths:
      - 'servers/mcpgw/**'
      - 'registry/**'
      - 'common/**'
      - 'docker/Dockerfile.mcp-server'
      - '.github/workflows/build-mcpgw.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/_build-image.yml
    with:
      image_name: p3v1o3c6/mcpgw
      dockerfile: docker/Dockerfile.mcp-server
      timeout_minutes: 45
      role_session_name: mcpgw-build
      summary_title: MCPGW Image Published
      extra_build_args: SERVER_DIR=servers/mcpgw
    secrets:
      ECR_ROLE: ${{ secrets.ECR_ROLE }}
