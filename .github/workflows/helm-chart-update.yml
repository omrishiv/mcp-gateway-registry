name: Update Image Tags on Release

on:
  workflow_run:
    workflows: ["Release Docker Images"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-image-tags:
    name: Update Image Tags in Helm Charts and Terraform
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.repository == 'agentic-community/mcp-gateway-registry'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version from tag
        id: version
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          TAG="$HEAD_BRANCH"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Update image tags in Helm charts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Only update global.image.tag (4-space indent under `global.image:`).
          # The per-service image.tag (2-space indent) is intentionally left
          # empty so it falls back to global.image.tag — do not overwrite it.
          for VALUES_FILE in \
            charts/mcp-gateway-registry-stack/values.yaml \
            charts/auth-server/values.yaml \
            charts/registry/values.yaml \
            charts/mcpgw/values.yaml; do
            sed -i "s/^\(    tag:\s*\).*/\1${VERSION}/" "$VALUES_FILE"
            echo "Updated $VALUES_FILE"
          done

      - name: Update public ECR image defaults in Terraform variables.tf
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Bump the `default = "public.ecr.aws/p3v1o3c6/<service>:<version>"`
          # lines in the Terraform variable declarations. These defaults are
          # what `terraform apply` uses when the operator does not set the
          # corresponding variable in their `terraform.tfvars`, so they
          # decide what image a fresh ECS deployment pulls. They MUST track
          # the latest released version.
          #
          # `terraform.tfvars.example` is intentionally NOT touched here.
          # That file is documentation only (Terraform never reads it). Its
          # commented-out lines stay as `:latest` placeholders that operators
          # uncomment and edit in their own `terraform.tfvars` if they want
          # to override the default with a custom-built image.
          for VARS_FILE in \
            terraform/aws-ecs/variables.tf \
            terraform/aws-ecs/modules/mcp-gateway/variables.tf; do
            sed -i -E "s|(public\\.ecr\\.aws/p3v1o3c6/[a-zA-Z0-9._-]+:)[0-9]+\\.[0-9]+\\.[0-9]+[A-Za-z0-9._-]*|\\1${VERSION}|g" "$VARS_FILE"
            echo "Updated $VARS_FILE"
          done

      - name: Check for changes
        id: update
        run: |
          if git diff --quiet; then
            echo "All files already at target version, skipping PR creation"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for new environment variables
        id: envcheck
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          TAG="$TAG"

          # Find the previous release tag. Include both v-prefixed historical
          # tags (<= v1.0.22-p1) and bare-semver tags (>= 1.23.0).
          PREV_TAG=$( (git tag --list 'v*.*.*'; git tag --list '[0-9]*.[0-9]*.[0-9]*') \
            | sort -V -r \
            | grep -v "^${TAG}$" \
            | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, skipping env var check"
            echo "comment=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Comparing env vars between $PREV_TAG and $TAG"

          # Extract env var names from app code at each tag
          extract_env_vars() {
            local ref="$1"
            git show "${ref}:registry/core/config.py" 2>/dev/null | \
              grep -oP '(?:env=")[A-Z_][A-Z0-9_]*(?:")' | sed 's/env="//;s/"//' || true
            for f in auth_server/server.py servers/mcpgw/server.py; do
              git show "${ref}:${f}" 2>/dev/null | \
                grep -oP '(?:os\.environ\.get|os\.getenv|os\.environ\[)\s*\(?\s*["\x27]([A-Z_][A-Z0-9_]*)["\x27]' | \
                grep -oP '[A-Z_][A-Z0-9_]+' || true
            done
          }

          extract_env_vars "$PREV_TAG" | sort -u > /tmp/env_old.txt
          extract_env_vars "$TAG" | sort -u > /tmp/env_new.txt

          # Find newly added env vars
          NEW_VARS=$(comm -13 /tmp/env_old.txt /tmp/env_new.txt)
          if [ -z "$NEW_VARS" ]; then
            echo "No new environment variables detected"
            echo "comment=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check which new vars are missing from helm templates
          MISSING=""
          for VAR in $NEW_VARS; do
            if ! grep -rq "$VAR" charts/*/templates/; then
              MISSING="${MISSING}\n- \`${VAR}\`"
            fi
          done

          if [ -z "$MISSING" ]; then
            echo "All new env vars are already in helm templates"
            echo "comment=" >> "$GITHUB_OUTPUT"
          else
            COMMENT=$(cat <<INNEREOF
          **Warning: New environment variables detected that are not in Helm chart templates.**

          The following env vars were added between \`$PREV_TAG\` and \`$TAG\` but are not referenced in any chart template under \`charts/*/templates/\`:
          $(echo -e "$MISSING")

          Please verify whether these need to be added to the Helm secret/configmap templates and \`values.yaml\` files before merging.
          INNEREOF
          )
            # Write multiline output
            {
              echo "comment<<EOF"
              echo "$COMMENT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          branch: release-update-${{ steps.version.outputs.version }}
          commit-message: "chore: update image tags to ${{ steps.version.outputs.version }}"
          title: "chore: update image tags to ${{ steps.version.outputs.version }}"
          body: |
            Automated update of image tags to `${{ steps.version.outputs.version }}` following release `${{ steps.version.outputs.tag }}`.

            Updated files:
            - `charts/mcp-gateway-registry-stack/values.yaml`
            - `charts/auth-server/values.yaml`
            - `charts/registry/values.yaml`
            - `charts/mcpgw/values.yaml`
            - `terraform/aws-ecs/variables.tf`
            - `terraform/aws-ecs/modules/mcp-gateway/variables.tf`
          labels: release

      - name: Comment on PR with missing env vars
        if: steps.update.outputs.changed == 'true' && steps.envcheck.outputs.comment != ''
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          issue-number: ${{ steps.create-pr.outputs.pull-request-number }}
          body: ${{ steps.envcheck.outputs.comment }}
