name: Build Auth Server Image

on:
  push:
    branches: [main]
    paths:
      - 'auth_server/**'
      - 'registry/**'
      - 'common/**'
      - 'docker/Dockerfile.auth'
      - 'docker/auth-entrypoint.sh'
      - '.github/workflows/build-auth-server.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/_build-image.yml
    with:
      image_name: p3v1o3c6/auth-server
      dockerfile: docker/Dockerfile.auth
      timeout_minutes: 30
      role_session_name: auth-server-build
      summary_title: Auth Server Image Published
    secrets:
      ECR_ROLE: ${{ secrets.ECR_ROLE }}
